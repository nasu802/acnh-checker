<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あつ森チェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
  background: #e8f5da;
  color: #222;
  min-height: 100vh;
  overflow-x: hidden;
}

/* モード切替タブ */
.mode-tabs {
  display: flex;
  background: #3d6b2a;
  border-bottom: 3px solid #2d5020;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.mode-tabs::-webkit-scrollbar { display: none; }
.mode-tab {
  flex: 1;
  min-width: 52px;
  padding: 7px 6px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.15s;
  font-family: inherit;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.mode-tab.active {
  color: #fff;
  background: rgba(255,255,255,0.18);
  border-bottom: 3px solid #d4f06a;
  margin-bottom: -3px;
}
.mode-tab:hover:not(.active) { color: rgba(255,255,255,0.88); }

/* スティッキーヘッダーラッパー */
#stickyWrapper {
  position: sticky;
  top: 0;
  z-index: 200;
}

/* ヘッダー */
header {
  color: white;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.12);
  overflow: hidden;
  min-width: 0;
}
header h1 { font-size: 15px; font-weight: 800; letter-spacing: 0.02em; flex-shrink: 0; min-width: 0; }
.header-stats { font-size: 11px; opacity: 0.95; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-left: auto; }
#userSwitcher {
  display: flex; gap: 4px;
  flex: 1; min-width: 0;
  overflow-x: auto;
  scrollbar-width: none;
  align-items: center;
  padding: 0 4px;
}
#userSwitcher::-webkit-scrollbar { display: none; }
.user-switch-btn {
  padding: 3px 9px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.3);
  background: transparent; color: rgba(255,255,255,0.65);
  font-size: 12px; font-weight: 700; font-family: inherit;
  cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
}
.user-switch-btn.active {
  background: rgba(255,255,255,0.92); color: var(--mode-color, #2d5020); border-color: transparent;
}
.user-switch-btn.is-me {
  border-color: rgba(255,255,255,0.7);
}
.user-switch-btn.is-me .me-label {
  font-size: 9px; background: rgba(255,255,255,0.3); color: white;
  padding: 1px 4px; border-radius: 5px; margin-left: 4px; font-weight: 700; vertical-align: middle;
}
.user-switch-btn.is-me.active .me-label {
  background: var(--mode-color, #2d5020); color: white; opacity: 0.75;
}
.viewing-badge {
  font-size: 11px; background: #ff9800; color: white;
  padding: 2px 8px; border-radius: 8px; font-weight: 800; margin-left: 6px;
}
.backup-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 8px; color: white; font-size: 16px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-users {
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.header-user-dot {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9);
}
.header-user-dot .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.5);
}

/* コントロール */
.controls {
  background: white;
  padding: 7px 12px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: none;
}
.ctrl-btns-row {
  background: white;
  padding: 6px 12px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid #e8e8e8;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.ctrl-btns-row::-webkit-scrollbar { display: none; }
.ctrl-sep {
  width: 1px;
  height: 18px;
  background: #e0e0e0;
  flex-shrink: 0;
  border-radius: 1px;
}
.search-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  flex: 1;
  min-width: 0;
}
input[type=search] {
  padding: 7px 72px 7px 14px;
  border: 1.5px solid #d8d8d8;
  border-radius: 22px;
  font-size: 14px;
  font-family: inherit;
  width: 0;
  flex: 1;
  min-width: 80px;
  outline: none;
  background: #f8f8f8;
  color: #222;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color .15s, background .15s;
}
input[type=search]:focus { border-color: var(--mode-color, #5a9e38); background: white; }
input[type=search]::-webkit-search-cancel-button { display: none; }

.partial-in-search {
  position: absolute;
  right: 32px;
  font-size: 11px;
  font-weight: 700;
  font-family: inherit;
  padding: 3px 7px;
  border-radius: 10px;
  border: 1.5px solid #ccc;
  background: white;
  color: #aaa;
  cursor: pointer;
  white-space: nowrap;
  line-height: 1.3;
  transition: all .12s;
}
.partial-in-search.active {
  background: var(--mode-color, #5a9e38);
  color: white;
  border-color: var(--mode-color, #5a9e38);
}
#searchClear {
  position: absolute;
  right: 6px;
  width: 22px;
  height: 22px;
  background: #bbb;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
  color: white;
  padding: 0;
  line-height: 22px;
  text-align: center;
  display: none;
  font-family: inherit;
}
#searchClear:hover { background: #888; }
/* partial-label removed (now ctrl-btn) */

/* カテゴリタブ */
.cat-tabs {
  background: white;
  padding: 0 12px;
  display: flex;
  gap: 2px;
  overflow-x: auto;
  border-bottom: 2px solid #e0e0e0;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  border: none;
  background: none;
  color: #888;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.badge {
  font-size: 11px;
  background: #f0f0f0;
  color: #888;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

/* かなナビ */
.kana-nav {
  background: white;
  padding: 6px 12px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  border-bottom: 1px solid #e8e8e8;
  scrollbar-width: none;
}
.kana-nav::-webkit-scrollbar { display: none; }
.kana-btn {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  border: 1.5px solid #ddd;
  background: white;
  color: #666;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
  flex-shrink: 0;
}
.kana-btn:hover { border-color: #aaa; color: #333; background: #f5f5f5; }

/* メインコンテンツ */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section-block {
  background: white;
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: 0 3px 0 #bbd498, 0 4px 10px rgba(0,0,0,0.07);
  border: 1.5px solid #d0e8b8;
}

.section-label {
  font-size: 15px;
  font-weight: 800;
  color: #333;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label .cat-icon {
  width: 6px;
  height: 18px;
  border-radius: 3px;
  flex-shrink: 0;
}
.section-remain {
  font-size: 12px;
  color: #999;
  font-weight: 700;
  margin-left: auto;
}

.items-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
/* リスト表示モード */
.items-list { display: flex; flex-direction: column; margin-top: 8px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
.list-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14px; font-family: inherit; font-weight: 700; cursor: pointer; gap: 10px; background: white; user-select: none; }
.list-row:last-child { border-bottom: none; }
.list-row:active { background: #f5f5f5; }
.list-row .list-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d8d8d8; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; }
.list-row.list-checked .list-check { background: var(--mode-color, #5a9e38); border-color: var(--mode-color, #5a9e38); color: white; }
.list-row.list-checked .list-name { color: #b0b0b0; text-decoration: line-through; }
.list-row .list-name { flex: 1; }
.list-row .list-src { font-size: 11px; color: #bbb; flex-shrink: 0; }
.done-items-list { display: flex; flex-direction: column; border-radius: 10px; overflow: hidden; border: 1px solid #eee; margin-top: 4px; }
.done-items-list .list-row { background: #fafafa; }


.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 15px;
  border-radius: 24px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  border: 2px solid;
  line-height: 1.3;
  min-height: 44px;
}


.all-scope-divider {
  font-size: 12px;
  font-weight: 700;
  color: #aaa;
  padding: 14px 4px 6px;
  border-top: 1px solid #eee;
  margin-top: 10px;
}
.chip-all-done {
  background: #e8f5e1;
  color: #3a7a20;
  border-color: #b2d99a;
  opacity: 0.75;
}
.chip-all-done::before { content: '✓ '; font-size: 10px; }
.chip-todo {
  background: white;
  border-color: #ccc;
  color: #333;
  box-shadow: 0 2px 0 #bbb;
}
.chip-todo:active { box-shadow: none; transform: translateY(2px); }

@keyframes chipPop {
  0%   { transform: scale(1);    opacity: 1; }
  30%  { transform: scale(1.18); opacity: 1; }
  70%  { transform: scale(0.9);  opacity: 0.6; }
  100% { transform: scale(0.75); opacity: 0; }
}
.chip-popping {
  pointer-events: none;
  animation: chipPop 0.35s ease forwards;
}

/* 済みセクション */
.done-section {
  border-radius: 12px;
  padding: 12px 14px;
  border: 2px dashed #ddd;
  margin-top: 14px;
  background: #fafafa;
}
.done-header { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.done-title { font-size: 13px; font-weight: 800; color: #aaa; }
.done-count { font-size: 11px; background: #eee; color: #999; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
.done-toggle { margin-left: auto; font-size: 12px; color: #bbb; font-weight: 700; }
.chip-done {
  background: #f2f2f2;
  border-color: #ddd;
  color: #aaa;
  font-size: 13px;
  padding: 5px 12px;
  box-shadow: none;
}
.chip-done::before { content: "✓ "; font-size: 11px; color: #bbb; }
.chip-done:hover { border-color: #ff7043; background: #fff5f3; color: #e05030; }
.chip-done:hover::before { color: #ff7043; }
.chip-done.selected { background: #fff3e0; border-color: #ff9800; color: #e65100; box-shadow: 0 0 0 2px #ffcc80; }
.chip-done.selected::before { content: "☑ "; color: #ff9800; }
.chip-new::after { content: "NEW"; font-size: 9px; background: currentColor; color: white; padding: 1px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; font-weight: 800; opacity: 0.85; }
/* 最近ページ */
.recent-section { padding: 14px 16px; }
.recent-date-label { font-size: 12px; font-weight: 800; color: #999; margin: 12px 0 6px; }
.recent-item-name { font-size: 14px; font-weight: 700; flex: 1; }
.recent-item-mode { font-size: 11px; color: white; padding: 2px 7px; border-radius: 6px; font-weight: 700; flex-shrink: 0; }
.recent-item-time { font-size: 11px; color: #aaa; font-weight: 700; flex-shrink: 0; }

/* 入手方法フィルター */
/* src-filters は ctrl-btns-row 内に統合 */
.src-filters-label { font-size: 11px; color: #999; white-space: nowrap; flex-shrink: 0; }
.src-btn {
  padding: 4px 11px;
  border-radius: 20px;
  border: 1.5px solid #d0d0d0;
  background: white;
  color: #777;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  font-weight: 700;
  flex-shrink: 0;
  transition: background .12s, color .12s, border-color .12s;
  line-height: 1.5;
}
.src-btn:hover { border-color: #aaa; color: #333; }
.src-btn.active-p { background: #f5a623; color: white; border-color: #f5a623; }
.src-btn.active-m { background: #4488cc; color: white; border-color: #4488cc; }
.src-btn.active-r { background: #5a9e38; color: white; border-color: #5a9e38; }

/* トースト通知 */
#toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 72px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  white-space: nowrap;
  max-width: 90vw;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.ok { background: #388e3c; }
#toast.err { background: #c62828; }
/* クラウドロード中オーバーレイ */
#cloudLoadOverlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.85);
  z-index: 8000; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px;
  font-size: 15px; color: #444; font-weight: 600;
}
#cloudLoadOverlay.show { display: flex; }
.cloud-spinner {
  width: 32px; height: 32px;
  border: 3px solid #ddd;
  border-top-color: #5a9e38;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }



/* コントロールボタン統一スタイル */
.ctrl-btn {
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  border: 1.5px solid #d0d0d0;
  border-radius: 20px;
  background: white;
  color: #777;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .12s, color .12s, border-color .12s;
  line-height: 1.5;
  letter-spacing: 0.01em;
}
.ctrl-btn:hover { border-color: #aaa; color: #555; }
.ctrl-btn.active {
  background: var(--mode-color, #5a9e38);
  color: white;
  border-color: var(--mode-color, #5a9e38);
}

.select-bar {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
  padding: 8px 10px; background: #fff8e1; border-radius: 10px;
  border: 1.5px solid #ffe082;
}
.select-bar-count { font-size: 13px; font-weight: 700; color: #f57c00; flex: 1; }
.select-del-btn {
  padding: 5px 14px; border-radius: 8px; border: none;
  background: #ff7043; color: white; font-size: 13px;
  font-weight: 800; font-family: inherit; cursor: pointer;
}
.select-del-btn:disabled { background: #ccc; cursor: default; }
.select-cancel-btn {
  padding: 5px 12px; border-radius: 8px; border: 1.5px solid #ccc;
  background: white; color: #666; font-size: 13px;
  font-weight: 700; font-family: inherit; cursor: pointer;
}
.done-sel-btn {
  font-size: 11px; padding: 2px 8px; border-radius: 6px;
  border: 1.5px solid #ddd; background: white; color: #888;
  font-weight: 700; font-family: inherit; cursor: pointer; margin-left: 6px;
}
.done-sel-btn:hover { border-color: #aaa; color: #444; }

.progress-wrap { background: #eee; border-radius: 6px; height: 7px; overflow: hidden; margin: 10px 0 0; }
.progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }

.done-items { display: none; margin-top: 10px; }
.done-items.open { display: flex; flex-wrap: wrap; gap: 6px; }
.empty { color: #bbb; font-size: 14px; padding: 12px 0; text-align: center; font-weight: 700; }

/* ===== モードごとの色 ===== */

/* 家具: 葉っぱグリーン */
.mode-kagu header { background: #5a9e38; }
.mode-kagu input[type=search]:focus { border-color: #5a9e38; }
.mode-kagu .cat-tab:hover { color: #5a9e38; }
.mode-kagu .cat-tab.active { color: #3d7228; border-bottom-color: #5a9e38; }
.mode-kagu .cat-tab.active .badge { background: #c8eba0; color: #3d7228; }
.mode-kagu .chip-todo:hover { border-color: #5a9e38; background: #edfae0; color: #2d6020; }
.mode-kagu .progress-fill { background: linear-gradient(90deg, #5a9e38, #82c840); }
.mode-kagu .cat-icon { background: #5a9e38; }
.mode-kagu .kana-btn.hit { border-color: #5a9e38; color: #3d7228; background: #edfae0; }

/* レシピ: 空色ブルー */
body.mode-recipe { background: #dceef8; }
.mode-recipe .section-block { box-shadow: 0 3px 0 #9cc4e0, 0 4px 10px rgba(0,0,0,0.07); border-color: #b8d8f0; }
.mode-recipe header { background: #4488cc; }
.mode-recipe input[type=search]:focus { border-color: #4488cc; }
.mode-recipe .cat-tab:hover { color: #4488cc; }
.mode-recipe .cat-tab.active { color: #2d6aaa; border-bottom-color: #4488cc; }
.mode-recipe .cat-tab.active .badge { background: #b8d8f8; color: #2d6aaa; }
.mode-recipe .chip-todo:hover { border-color: #4488cc; background: #e8f4fb; color: #1e5090; }
.mode-recipe .progress-fill { background: linear-gradient(90deg, #4488cc, #68aae8); }
.mode-recipe .cat-icon { background: #4488cc; }
.mode-recipe .kana-btn.hit { border-color: #4488cc; color: #2d6aaa; background: #e8f4fb; }

/* とたけけ: 夕焼けコーラル */
body.mode-music { background: #faeee0; }
.mode-music .section-block { box-shadow: 0 3px 0 #e0b898, 0 4px 10px rgba(0,0,0,0.07); border-color: #f0d0b0; }
.mode-music header { background: #d07040; }
.mode-music input[type=search]:focus { border-color: #d07040; }
.mode-music .cat-tab:hover { color: #d07040; }
.mode-music .cat-tab.active { color: #a05020; border-bottom-color: #d07040; }
.mode-music .cat-tab.active .badge { background: #fad8b8; color: #a05020; }
.mode-music .chip-todo:hover { border-color: #d07040; background: #fef0e8; color: #a05020; }
.mode-music .cat-icon { background: #d07040; }
.mode-music .progress-fill { background: linear-gradient(90deg, #d07040, #f0a060); }
.mode-music .kana-btn.hit { border-color: #d07040; color: #a05020; background: #fef0e8; }

/* 美術品: 博物館ブラウン */
body.mode-art { background: #f2e8d8; }
.mode-art .section-block { box-shadow: 0 3px 0 #c0a070, 0 4px 10px rgba(0,0,0,0.07); border-color: #ddc898; }
.mode-art header { background: #9a6828; }
.mode-art input[type=search]:focus { border-color: #9a6828; }
.mode-art .cat-tab:hover { color: #9a6828; }
.mode-art .cat-tab.active { color: #7a5018; border-bottom-color: #9a6828; }
.mode-art .cat-tab.active .badge { background: #f0d8a0; color: #7a5018; }
.mode-art .chip-todo:hover { border-color: #9a6828; background: #f9f0e0; color: #6a4010; }
.mode-art .progress-fill { background: linear-gradient(90deg, #9a6828, #c89040); }
.mode-art .cat-icon { background: #9a6828; }
.mode-art .kana-btn.hit { border-color: #9a6828; color: #7a5018; background: #f9f0e0; }

/* 服: さくらピンク */
body.mode-fuku { background: #f9eaf2; }
.mode-fuku .section-block { box-shadow: 0 3px 0 #d48faa, 0 4px 10px rgba(0,0,0,0.07); border-color: #e8c0d0; }
.mode-fuku header { background: #b5447a; }

function getRankStyle(ratio) {
  // ratio: 0=一番最初にゲット(オレンジ), 1=一番最近ゲット(緑)
  const hue = Math.round(20 + ratio * 110);    // 20(オレンジ) → 130(緑)
  const sat = Math.round(55 + ratio * 20);      // 55% → 75%
  const lBorder = Math.round(52 - ratio * 10); // 52% → 42%
  const lBg = Math.round(97 - ratio * 4);      // 97% → 93%
  const lText = Math.round(42 - ratio * 20);   // 42% → 22%
  return {
    borderColor: `hsl(${hue},${sat}%,${lBorder}%)`,
    background:  `hsl(${hue},${sat}%,${lBg}%)`,
    color:       `hsl(${hue},${sat}%,${lText}%)`,
  };
}

// ---- バックアップ ----
const BACKUP_KEY = 'acnh_backup_v1';
const BACKUP_MAX = 5;
let backupTimer = null;
function scheduleAutoBackup() {
  clearTimeout(backupTimer);
  backupTimer = setTimeout(takeBackup, 5000);
}
function takeBackup() {
  const total = ['kagu','recipe','music','art','fuku','hhp','fossil'].reduce((s, m) => s + Object.keys(state[m].owned).length, 0);
  if (total === 0) return;
  const snap = {
    ts: Date.now(),
    user: currentUser,
    data: {}
  };
  for (const m of ['kagu','recipe','music','art','fuku','hhp','fossil']) snap.data[m] = { ...state[m].owned };
  const list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]');
  list.unshift(snap);
  if (list.length > BACKUP_MAX) list.length = BACKUP_MAX;
  localStorage.setItem(BACKUP_KEY, JSON.stringify(list));
}
function exportBackup() {
  const snap = { ts: Date.now(), user: currentUser, data: {} };
  for (const m of ['kagu','recipe','music','art','fuku','hhp','fossil']) snap.data[m] = { ...state[m].owned };
  const blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'acnh-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importBackup() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const snap = JSON.parse(ev.target.result);
        if (!snap.data) throw new Error();
        let total = 0;
        for (const m of ['kagu','recipe','music','art','fuku','hhp']) {
          if (snap.data[m]) { state[m].owned = { ...state[m].owned, ...snap.data[m] }; total += Object.keys(snap.data[m]).length; }
          localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
        }
        syncToCloud();
        render();
        alert(total + ' 件のデータを復元しました');
      } catch { alert('ファイルの読み込みに失敗しました'); }
    };
    reader.readAsText(file);
  };
  input.click();
}
function restoreFromLocalBackup() {
  const list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]');
  if (!list.length) { alert('ローカルバックアップが見つかりません'); return; }
  const latest = list[0];
  const d = new Date(latest.ts);
  const label = d.toLocaleDateString('ja') + ' ' + d.toLocaleTimeString('ja');
  if (!confirm(label + ' のバックアップから復元しますか？')) return;
  let total = 0;
  for (const m of ['kagu','recipe','music','art','fuku','hhp']) {
    if (latest.data[m]) { state[m].owned = { ...state[m].owned, ...latest.data[m] }; total += Object.keys(latest.data[m]).length; }
    localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
  }
  syncToCloud();
  render();
  alert(total + ' 件のデータを復元しました');
}
function showBackupMenu() {
  const list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]');
  const latest = list[0];
  const latestLabel = latest ? '最新: ' + new Date(latest.ts).toLocaleString('ja') + ' (' + Object.values(latest.data).reduce((s,o) => s + Object.keys(o).length, 0) + '件)' : 'なし';
  const choice = window.prompt(
    'バックアップ\n\n自動バックアップ ' + latestLabel + '\n\n1: ローカルバックアップから復元\n2: JSONファイルにエクスポート\n3: JSONファイルからインポート\n\n番号を入力（キャンセルで閉じる）'
  );
  if (choice === '1') restoreFromLocalBackup();
  else if (choice === '2') exportBackup();
  else if (choice === '3') importBackup();
}
function updateUserBadge() {

async function syncToCloud() {
  if (!currentUser) return;
  // 全モードが空の場合はアップしない（空データによる上書き防止）
  const totalOwned = ['kagu','recipe','music','art','fuku','hhp','fossil'].reduce((s, m) => s + Object.keys(state[m].owned).length, 0)
    + Object.keys(modelState.done).length;
  if (totalOwned === 0) return;
  document.getElementById('syncIndicator').textContent = '↑';
  try {
    const rows = ['kagu','recipe','music','art','fuku','hhp','fossil'].map(m => ({
      username: currentUser, mode: m,
      owned: state[m].owned,
      updated_at: new Date().toISOString()
    }));
    rows.push({ username: currentUser, mode: 'model', owned: { done: modelState.done, counts: modelState.counts }, updated_at: new Date().toISOString() });
    const res = await fetch(SUPABASE_URL + '/rest/v1/progress', {
      method: 'POST', headers: DB_HEADERS, body: JSON.stringify(rows)
    });
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('syncIndicator').textContent = '✓';
    setTimeout(() => { document.getElementById('syncIndicator').textContent = ''; }, 1500);
  } catch(e) {
    document.getElementById('syncIndicator').textContent = '!';
  }
}
function scheduleSyncToCloud() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 600);
}
async function loadFromCloud(showResult=false) {
  if (!currentUser) return;
  document.getElementById('syncIndicator').textContent = '↓';
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/progress?select=mode,owned&username=eq.' + encodeURIComponent(currentUser),
      { headers: DB_HEADERS }
    );
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    let loaded = 0;
    if (data && data.length) {
      for (const row of data) {
        if (row.mode === 'model') {
          const cloudModel = row.owned || {};
          modelState.done   = cloudModel.done   || {};
          modelState.counts = cloudModel.counts || {};
          loaded += Object.keys(modelState.done).length;
          localStorage.setItem(MODEL_KEY, JSON.stringify(modelState));
        } else if (state[row.mode]) {
          const cloudOwned = row.owned || {};
          loaded += Object.keys(cloudOwned).length;
          state[row.mode].owned = { ...state[row.mode].owned, ...cloudOwned };
          localStorage.setItem(KEYS[row.mode], JSON.stringify(state[row.mode]));
        }
      }
    }
    runCrossSync();
    await syncToCloud();
    document.getElementById('syncIndicator').textContent = '';
    if (showResult) showToast('✅ ' + loaded + '件読み込みました', 'ok');
  } catch(e) {
    document.getElementById('syncIndicator').textContent = '!';
    if (showResult) showToast('❌ クラウド接続失敗。↻ボタンで再試行', 'err', 4000);
  }
}

// ========== 模型モード ==========
const MODEL_KEY = 'acnh_model_v1';
let modelState = { counts: {}, done: {} };

function loadModel() {
  try {
    const d = JSON.parse(localStorage.getItem(MODEL_KEY) || '{}');
    modelState.counts = d.counts || {};
    modelState.done   = d.done   || {};
  } catch { modelState = { counts: {}, done: {} }; }
}
function saveModel() {
  localStorage.setItem(MODEL_KEY, JSON.stringify(modelState));
  scheduleSyncToCloud();
}
function modelBump(ja) {
  if (isViewing) return;
  const cur = modelState.counts[ja] || 0;
  modelState.counts[ja] = cur >= 3 ? 0 : cur + 1;
  saveModel(); renderModel();
}
function modelToggleDone(ja, e) {
  if (e) e.stopPropagation();
  if (isViewing) return;
  const kaguEn = MODEL_KAGU_MAP[ja];
  if (kaguEn) {
    if (state.kagu.owned[kaguEn]) {
      delete state.kagu.owned[kaguEn];
    } else {
      state.kagu.owned[kaguEn] = Date.now();
      showToast('★ ' + ja + ' 模型完成！', 'success');
    }
    localStorage.setItem(KEYS.kagu, JSON.stringify(state.kagu));
    scheduleSyncToCloud();
  } else {
    modelState.done[ja] = !modelState.done[ja];
    if (modelState.done[ja]) showToast('★ ' + ja + ' 模型完成！', 'success');
    saveModel();
  }
  renderModel();
}

function renderModelTabs(kaguOwned, viewModelState) {
  const cats = Object.keys(DATA.model);
  const c = document.getElementById('catTabs');
  c.innerHTML = '';
  for (const cat of cats) {
    const remain = DATA.model[cat].filter(i => { const e=MODEL_KAGU_MAP[i.ja]; return e ? !(kaguOwned[e]) : !viewModelState.done[i.ja]; }).length;
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (currentCat.model === cat ? ' active' : '');
    btn.innerHTML = cat + '<span class="badge">' + remain + '</span>';
    btn.onclick = () => { currentCat.model = cat; render(); };
    c.appendChild(btn);
  }
}

function renderModel() {
  isViewing = !!(viewingUser && viewingUser !== currentUser);
  const kaguOwned = (isViewing && otherUsersData[viewingUser])
    ? (otherUsersData[viewingUser]['kagu'] || {})
    : state.kagu.owned;
  const viewModelState = isViewing
    ? (otherUsersData[viewingUser]?.['model'] || { done: {}, counts: {} })
    : modelState;
  renderModelTabs(kaguOwned, viewModelState);

  const allCats = Object.keys(DATA.model);
  const totalAll = allCats.reduce((s, c) => s + DATA.model[c].length, 0);
  const doneAll  = allCats.reduce((s, c) => s + DATA.model[c].filter(i => { const e=MODEL_KAGU_MAP[i.ja]; return e ? !!(kaguOwned[e]) : !!(viewModelState.done[i.ja]); }).length, 0);
  const pct = totalAll ? Math.round(doneAll / totalAll * 100) : 0;
  document.getElementById('headerStats').innerHTML =
    '<span style="font-size:10px;opacity:.75">残り' + (totalAll - doneAll) + '</span>&nbsp;<b style="font-size:17px">' + pct + '%</b>';

  const main = document.getElementById('main');
  main.innerHTML = '';

  // Controls row
  const ctrl = document.createElement('div');
  ctrl.className = 'model-controls';

  function mkMonthBtn(label, val, extraCls) {
    const b = document.createElement('button');
    b.className = 'model-month-btn ' + (extraCls||'') + (modelSeason===val ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { modelSeason = val; localStorage.setItem('acnh_model_season', String(val)); render(); };
    return b;
  }

  // 詳細ボタン
  const detBtn = document.createElement('button');
  detBtn.className = 'model-ctrl-btn detail-btn' + (modelDetailMode ? ' active' : '');
  detBtn.textContent = '詳細';
  detBtn.onclick = () => { modelDetailMode = !modelDetailMode; localStorage.setItem('acnh_model_detail', modelDetailMode ? '1' : '0'); render(); };
  ctrl.appendChild(detBtn);

  // 時間ハイライトボタン
  const timeHlBtn = document.createElement('button');
  timeHlBtn.className = 'model-ctrl-btn time-btn' + (modelTimeMode ? ' active' : '');
  timeHlBtn.textContent = '時間';
  timeHlBtn.onclick = () => {
    modelTimeMode = !modelTimeMode;
    localStorage.setItem('acnh_model_time', modelTimeMode ? '1' : '0');
    if (modelTimeMode && modelCustomHour === null) {
      // 初めてONにしたとき現在時刻をセット
      modelCustomHour = new Date().getHours();
    }
    render();
  };
  ctrl.appendChild(timeHlBtn);

  // 時間入力（🕐時間ONのときのみ表示）
  if (modelTimeMode) {
    const timeInput = document.createElement('input');
    timeInput.type = 'time';
    timeInput.className = 'model-time-input';
    const h = modelCustomHour !== null ? modelCustomHour : new Date().getHours();
    timeInput.value = String(h).padStart(2,'0') + ':00';
    timeInput.oninput = (e) => {
      const parts = e.target.value.split(':');
      if (parts[0] !== undefined) {
        modelCustomHour = parseInt(parts[0]);
        render();
      }
    };
    ctrl.appendChild(timeInput);
  }

  const div1 = document.createElement('span'); div1.className = 'season-divider'; ctrl.appendChild(div1);

  // 今月
  const nowM = new Date().getMonth() + 1;
  ctrl.appendChild(mkMonthBtn('今(' + nowM + '月)', 'now', 'now-btn'));

  // 1〜12月
  for (let m = 1; m <= 12; m++) {
    ctrl.appendChild(mkMonthBtn(m + '月', m));
  }

  // すべて
  ctrl.appendChild(mkMonthBtn('すべて', 'all', 'all-btn'));

  // 設定ボタン
  const div2 = document.createElement('span'); div2.className = 'season-divider'; ctrl.appendChild(div2);
  const settingsCtrlBtn = document.createElement('button');
  settingsCtrlBtn.className = 'model-ctrl-btn';
  settingsCtrlBtn.textContent = '設定';
  settingsCtrlBtn.onclick = openSettings;
  ctrl.appendChild(settingsCtrlBtn);

  main.appendChild(ctrl);

  const cat = currentCat.model;
  const items = DATA.model[cat] || [];
  const q = search.toLowerCase();

  let filtered = q ? items.filter(i => i.ja.toLowerCase().includes(q) || normalizeDakuten(i.ja).includes(normalizeDakuten(q))) : [...items];
  if (modelSeason !== 'all') filtered = filtered.filter(i => itemInMonth(i, modelSeason));

  const catTotal = items.length;
  const catDone  = items.filter(i => { const e=MODEL_KAGU_MAP[i.ja]; return e ? !!(kaguOwned[e]) : !!(viewModelState.done[i.ja]); }).length;
  const catPct   = catTotal ? Math.round(catDone / catTotal * 100) : 0;

  const sec = document.createElement('div');
  sec.className = 'section-block';

  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  const monthNote = modelSeason !== 'all' ? ' <span style="font-size:10px;color:#888">（' + filtered.length + '種）</span>' : ''; const seasonNote = monthNote;
  lbl.innerHTML = '<span class="cat-icon"></span>' + cat +
    '<span class="section-remain">' + catDone + ' / ' + catTotal + ' (' + catPct + '%)' + seasonNote + '</span>';
  sec.appendChild(lbl);

  const bar = document.createElement('div');
  bar.className = 'progress-wrap';
  bar.innerHTML = '<div class="progress-fill" style="width:' + catPct + '%"></div>';
  sec.appendChild(bar);

  const grid = document.createElement('div');
  grid.className = 'model-grid';

  for (const item of filtered) {
    const count = viewModelState.counts[item.ja] || 0;
    const _kaguEn = MODEL_KAGU_MAP[item.ja];
    const done  = _kaguEn ? !!(kaguOwned[_kaguEn]) : !!(viewModelState.done[item.ja]);
    let chipCls = 'model-chip';
    if (done)           chipCls += ' model-done-chip';
    else if (count===3) chipCls += ' model-c3';
    else if (count===2) chipCls += ' model-c2';
    else if (count===1) chipCls += ' model-c1';

    const wrap = document.createElement('div');
    wrap.className = 'model-chip-wrap';

    if (modelTimeMode && item.time) {
      chipCls += isActiveNow(item.time) ? ' time-active' : ' time-inactive';
    }
    const chip = document.createElement('div');
    chip.className = chipCls;
    if (!isViewing) chip.onclick = () => modelBump(item.ja);
    else chip.style.cursor = 'default';

    const dots = document.createElement('span');
    dots.className = 'model-dots';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('span'); d.className = 'mdot'; dots.appendChild(d);
    }
    chip.appendChild(dots);

    const nameEl = document.createElement('span');
    nameEl.className = 'model-name';
    nameEl.textContent = item.note ? item.ja + '(' + item.note + ')' : item.ja;
    chip.appendChild(nameEl);

    const star = document.createElement('button');
    star.className = 'model-star-btn' + (done ? ' active' : '');
    star.textContent = done ? '★' : '☆';
    if (!isViewing) star.onclick = (e) => modelToggleDone(item.ja, e);
    chip.appendChild(star);

    wrap.appendChild(chip);

    if (modelDetailMode && item.months) {
      const det = document.createElement('div');
      det.className = 'model-detail';
      const monthStr = formatMonths(item.months);
      const sep = '<span class="model-detail-sep">｜</span>';
      let detHTML = monthStr + sep + item.time + sep + item.place;
      if (item.condition) detHTML += '<span class="model-condition">' + item.condition + '</span>';
      det.innerHTML = detHTML;
      wrap.appendChild(det);
    }

    grid.appendChild(wrap);
  }

  if (!filtered.length) {
    const em = document.createElement('div');
    em.className = 'empty';
    em.textContent = q ? '見つかりませんでした' : (modelSeason !== 'all' ? 'この季節は出現しません' : '🎉 模型コンプリート！');
    sec.appendChild(em);
  }

  sec.appendChild(grid);
  main.appendChild(sec);
}

// 北半球月 → 南半球月変換
function toSouthMonths(months) {
  return months.map(m => ((m - 1 + 6) % 12) + 1);
}
// 月フィルター（月数字 or 'now' or 'all'）
function itemInMonth(item, filter) {
  if (filter === 'all') return true;
  const months = hemisphere === 'south' ? toSouthMonths(item.months) : item.months;
  const target = filter === 'now' ? new Date().getMonth() + 1 : filter;
  return months.includes(target);
}
function formatMonths(months) {
  const m = hemisphere === 'south' ? toSouthMonths(months) : months;
  const sorted = [...new Set(m)].sort((a,b) => a-b);
  if (sorted.length === 12) return '通年';
  // group consecutive
  const groups = [];
  let start = sorted[0], prev = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    const diff = sorted[i] - prev;
    const wrapDiff = (sorted[i] === 1 && prev === 12) ? 1 : diff;
    if (diff === 1 || wrapDiff === 1) { prev = sorted[i]; }
    else { groups.push([start, prev]); start = sorted[i]; prev = sorted[i]; }
  }
  groups.push([start, prev]);
  return groups.map(([s,e]) => s === e ? s+'月' : s+'〜'+e+'月').join('・');
}

// カスタム時刻 or 現在時刻
function getModelHour() {
  return modelCustomHour !== null ? modelCustomHour : new Date().getHours();
}
// 今の時間に出現するか（時間文字列をパース）
function isActiveNow(timeStr) {
  if (!timeStr || timeStr === '終日') return true;
  const h = getModelHour();
  return timeStr.split('・').some(part => {
    const m = part.match(/(\d+)[時]?[〜~](\d+)時/);
    if (!m) return false;
    const s = parseInt(m[1]), e = parseInt(m[2]);
    if (s < e) return h >= s && h < e;
    return h >= s || h < e; // 深夜またがり
  });
}

  const nq = normalizeDakuten(q);
  const filtered = cats.filter(item => {
    if (q && !normalizeDakuten(item.ja).includes(nq) && !item.en.toLowerCase().includes(q)) return false;
    const haveCount = partyUserNames.filter(u => (partyAllData[u][partyItemMode] || new Set()).has(item.en)).length;

// undo/redo スタック
let undoStack = [], redoStack = [];
function snapshot() {
  return {
    mode,
    kagu:   { owned: {...state.kagu.owned},   doneOpen: {...state.kagu.doneOpen} },
    recipe: { owned: {...state.recipe.owned}, doneOpen: {...state.recipe.doneOpen} },
    music:  { owned: {...state.music.owned},  doneOpen: {...state.music.doneOpen} },
    art:    { owned: {...state.art.owned},   doneOpen: {...state.art.doneOpen} },
    fuku:   { owned: {...state.fuku.owned},   doneOpen: {...state.fuku.doneOpen} },
    hhp:    { owned: {...state.hhp.owned},    doneOpen: {...state.hhp.doneOpen} }
  };
}
function pushUndo() {
  undoStack.push(snapshot());
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function applySnapshot(snap) {
  state.kagu   = { owned: {...snap.kagu.owned},   doneOpen: {...snap.kagu.doneOpen} };
  state.recipe = { owned: {...snap.recipe.owned}, doneOpen: {...snap.recipe.doneOpen} };
  state.music  = { owned: {...snap.music.owned},  doneOpen: {...snap.music.doneOpen} };
  state.art    = { owned: {...snap.art.owned},   doneOpen: {...snap.art.doneOpen} };
  state.fuku   = { owned: {...snap.fuku.owned},   doneOpen: {...snap.fuku.doneOpen} };
  state.hhp    = { owned: {...snap.hhp.owned},    doneOpen: {...snap.hhp.doneOpen} };
  for (const m of ['kagu','recipe','music','art','fuku','hhp'])
    localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
  render();
}
document.addEventListener('keydown', e => {
  if (!(e.metaKey || e.ctrlKey)) return;
  if (e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (!undoStack.length) return;
    redoStack.push(snapshot());
    applySnapshot(undoStack.pop());
  } else if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) {
    e.preventDefault();
    if (!redoStack.length) return;
    undoStack.push(snapshot());
    applySnapshot(redoStack.pop());
  }
});


function runCrossSync() {
  // 全モードの収集済みアイテムをクロスモードに伝播（起動時・クラウド読込後に実行）
  for (const m of ['kagu','recipe','music','art','fuku','hhp']) {
    for (const [en, ts] of Object.entries(state[m].owned)) {
      const siblings = crossRef[en];
      if (!siblings) continue;
      for (const sm of siblings) {
        if (sm === m) continue;
        if (!state[sm].owned[en]) state[sm].owned[en] = ts;
      }
    }
  }
  for (const m of ['kagu','recipe','music','art','fuku','hhp'])
    localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
}
function syncCheck(id, ts) {
  const siblings = crossRef[id];
  if (!siblings) return;
  for (const m of siblings) {
    if (m === mode) continue;
    if (ts) state[m].owned[id] = ts;
    else    delete state[m].owned[id];
    localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
  }
}

function check(id, chipEl) {
  pushUndo();
  const ts = Date.now();
  if (chipEl) {
    chipEl.classList.add('chip-popping');
    setTimeout(() => { state[mode].owned[id] = ts; syncCheck(id, ts); save(); render(); }, 320);
  } else {
    state[mode].owned[id] = ts; syncCheck(id, ts); save(); render();
  }
}
function uncheck(id) { pushUndo(); delete state[mode].owned[id]; syncCheck(id, null); save(); render(); }
function uncheckFromMode(id, m) {
  pushUndo();
  const prev = mode; mode = m;
  delete state[m].owned[id];
  syncCheck(id, null);
  mode = prev;
  save(); render();
}

  const c = document.getElementById('catTabs');
  c.innerHTML = '';
  const kaguMixCats = ['家具', '小物', '壁掛け', '天井'];
  const specialTabs = mode === 'kagu' ? ['すべて', '家具まとめ', ...cats] : ['すべて', ...cats];
  for (const cat of specialTabs) {
    let remain;
    if (cat === 'すべて') {
      remain = cats.reduce((s, k) => s + items[k].filter(i => !owned[i.en]).length, 0);
    } else if (cat === '家具まとめ') {
      remain = kaguMixCats.reduce((s, k) => s + (items[k] || []).filter(i => !owned[i.en]).length, 0);
    } else {
      remain = items[cat].filter(i => !owned[i.en]).length;
    }

function render() {
  const dmBtn = document.getElementById('displayModeBtn');
  if (dmBtn) { dmBtn.textContent = displayMode === 'chip' ? 'リスト' : 'チップ'; dmBtn.className = 'ctrl-btn' + (displayMode === 'list' ? ' active' : ''); }
  updateSortBtn();
  if (mode === 'recent') { renderRecent(); return; }
  if (mode === 'all') { renderAll(); return; }
  if (mode === 'model') { renderModel(); return; }
  isViewing = !!(viewingUser && viewingUser !== currentUser);
  renderTabs();
  const items = DATA[mode];
  const cats = Object.keys(items);
  const owned = getDisplayOwned();
  const doneOpen = state[mode].doneOpen;
  const totalAll = cats.reduce((s, k) => s + items[k].length, 0);
  const ownedAll = Object.keys(owned).length;
  const word = mode === 'kagu' ? '個収集済' : mode === 'recipe' ? '個習得済' : mode === 'art' ? '個寄贈済' : '個入手済';
  const pctAll = totalAll ? Math.round(ownedAll / totalAll * 100) : 0;
  document.getElementById('headerStats').innerHTML =
    '<span style="font-size:10px;opacity:.75">残り' + (totalAll - ownedAll) + '</span>&nbsp;<b style="font-size:17px">' + pctAll + '%</b>';

  const main = document.getElementById('main');
  main.innerHTML = '';
  const q = search.toLowerCase();



  if (currentCat[mode] === 'すべて' || (mode === 'kagu' && currentCat[mode] === '家具まとめ')) {
    const mixCats = (mode === 'kagu' && currentCat[mode] === '家具まとめ')
      ? ['家具', '小物', '壁掛け', '天井']
      : cats;
    let allItems = mixCats.flatMap(cat => (items[cat] || []).map(i => ({...i, cat})));
    if (q) allItems = allItems.filter(i => matchSearch(i.ja, i.en, q) || i.cat.includes(q));
    allItems = applySrcFilter(allItems);
    const todoItems = allItems.filter(i => !owned[i.en]).sort((a,b) => sortOrder === 'new' ? sortByNew(a,b,owned) : sortByKana(a,b));
    const doneItems = allItems.filter(i =>  owned[i.en]).sort((a,b) => sortOrder === "new" ? (owned[b.en] - owned[a.en]) : sortByKana(a,b));

    const sec = document.createElement('div');
    sec.className = 'section-block';
    appendTodoDone(sec, todoItems, doneItems, currentCat[mode], q, owned);
    main.appendChild(sec);
    return;
  }

  for (const cat of [currentCat[mode]]) {
    let itms = applySrcFilter(items[cat]);
    if (q) itms = itms.filter(i => matchSearch(i.ja, i.en, q));
    const todoItems = itms.filter(i => !owned[i.en]).sort((a,b) => sortOrder === 'new' ? sortByNew(a,b,owned) : sortByKana(a,b));
    const doneItems = itms.filter(i => owned[i.en]).sort((a, b) => sortOrder === "new" ? (owned[b.en] - owned[a.en]) : sortByKana(a,b));
    if (!todoItems.length && !doneItems.length) continue;

    const total = items[cat].length;
    const got = items[cat].filter(i => owned[i.en]).length;
    const pct = Math.round(got / total * 100);

    const sec = document.createElement('div');
    sec.className = 'section-block';

    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = '<span class="cat-icon"></span>' + cat +
      '<span class="section-remain">' + got + ' / ' + total + ' (' + pct + '%)</span>';
    sec.appendChild(lbl);

    const bar = document.createElement('div');
    bar.className = 'progress-wrap';
    bar.innerHTML = '<div class="progress-fill" style="width:' + pct + '%"></div>';
    sec.appendChild(bar);

    appendTodoDone(sec, todoItems, doneItems, cat, q, owned);
    main.appendChild(sec);
  }
}


function getSrcEmoji(s) {
  if (!s) return '';
  if (s.includes('r')) return '📋';
  if (s.includes('m')) return '⭐';
  if (s.includes('p')) return '🪙';
  return '';
}
function appendTodoDone(sec, todoItems, doneItems, cat, q, owned) {
  const doneOpen = state[mode].doneOpen;
  const doneLabel = mode === 'kagu' ? '✅ 収集済み' : mode === 'recipe' ? '✅ 習得済み' : mode === 'art' ? '✅ 寄贈済み' : '✅ 入手済み';
  const emptyMsg  = mode === 'kagu' ? '🎉 すべて収集済み！' : mode === 'recipe' ? '🎉 すべて習得済み！' : mode === 'art' ? '🎉 すべて寄贈済み！' : '🎉 すべて入手済み！';

  // 「全て」スコープ: 収集済み・未収集を同一リストに統合表示
  if (searchScope === 'all') {
    if (!todoItems.length && !doneItems.length) return;
    const sortFn = sortOrder === 'new' ? (a,b) => sortByNew(a,b,owned) : sortByKana;
    const allItems = [...todoItems, ...doneItems].sort(sortFn);

    if (displayMode === 'list') {
      const list = document.createElement('div');
      list.className = 'items-list';
      for (const item of allItems) {
        const isDone = !!owned[item.en];
        const row = document.createElement('div');
        row.className = 'list-row' + (isDone ? ' list-checked' : '');
        row.innerHTML = '<span class="list-check">' + (isDone ? '✓' : '') + '</span><span class="list-name">' + item.ja + '</span><span class="list-src">' + getSrcEmoji(item.s) + '</span>';
        if (!isViewing) row.onclick = isDone ? () => uncheck(item.en) : () => check(item.en, row);
        list.appendChild(row);
      }
      sec.appendChild(list);
    } else {
      const grid = document.createElement('div');
      grid.className = 'items-grid';
      for (const item of allItems) {
        const isDone = !!owned[item.en];
        const chip = document.createElement('span');
        chip.className = 'chip ' + (isDone ? 'chip-all-done' : 'chip-todo');
        chip.textContent = item.ja;
        if (isDone) chip.dataset.en = item.en;
        if (!isViewing) chip.onclick = isDone ? () => uncheck(item.en) : () => check(item.en, chip);
        grid.appendChild(chip);
      }
      sec.appendChild(grid);
    }
    return;
  }

  if (searchScope !== 'done') {
    if (todoItems.length > 0) {
      if (displayMode === 'list') {
        const list = document.createElement('div');
        list.className = 'items-list';
        for (const item of todoItems) {
          const row = document.createElement('div');
          row.className = 'list-row';
          row.innerHTML = '<span class="list-check"></span><span class="list-name">' + item.ja + '</span><span class="list-src">' + getSrcEmoji(item.s) + '</span>';
          if (!isViewing) row.onclick = () => check(item.en, row);
          else row.style.cursor = 'default';
          list.appendChild(row);
        }
        sec.appendChild(list);
      } else {
        const grid = document.createElement('div');
        grid.className = 'items-grid';
        for (const item of todoItems) {
          const chip = document.createElement('span');
          chip.className = 'chip chip-todo';
          chip.textContent = item.ja;
          chip.title = item.cat || '';
          if (!isViewing) chip.onclick = () => check(item.en, chip);
          else chip.style.cursor = 'default';
          grid.appendChild(chip);
        }
        sec.appendChild(grid);
      }
    } else if (!q) {
      const em = document.createElement('div');
      em.className = 'empty';
      em.textContent = emptyMsg;
      sec.appendChild(em);
    }
  }

  if (doneItems.length > 0) {
    const forceOpen = searchScope === 'done' || (q && searchScope === 'all');
    const isOpen = forceOpen || doneOpen[cat];

    const doneDiv = document.createElement('div');
    doneDiv.className = 'done-section';
    const hdr = document.createElement('div');
    hdr.className = 'done-header';
    const togSpan = document.createElement('span');
    togSpan.id = 'dtog-' + cat;
    togSpan.className = 'done-toggle';
    togSpan.textContent = isOpen ? '▲ 閉じる' : '▼ 済みを見る';
    togSpan.onclick = () => toggleDone(cat);
    hdr.innerHTML = '<span class="done-title">' + doneLabel + '</span>' +
      '<span class="done-count">' + doneItems.length + ' 個</span>';
    // 選択ボタン
    const selBtn = document.createElement('button');
    selBtn.className = 'done-sel-btn';
    selBtn.textContent = selectMode ? 'キャンセル' : '選択';
    selBtn.onclick = e => { e.stopPropagation(); selectMode ? exitSelectMode() : enterSelectMode(); };
    hdr.appendChild(selBtn);
    hdr.appendChild(togSpan);
    doneDiv.appendChild(hdr);

    // 選択モード中のバー
    if (selectMode) {
      const bar = document.createElement('div');
      bar.className = 'select-bar';
      bar.innerHTML = '<span class="select-bar-count" id="selectCount">' + selectedItems.size + '件選択中</span>';
      const allBtn = document.createElement('button');
      allBtn.className = 'select-cancel-btn';
      allBtn.textContent = '全選択';
      allBtn.onclick = () => { doneItems.forEach(i => selectedItems.add(i.en)); document.querySelectorAll('.chip-done[data-en]').forEach(el => el.classList.add('selected')); document.getElementById('selectCount').textContent = selectedItems.size + '件選択中'; document.getElementById('selectDelBtn').disabled = false; };
      const delBtn = document.createElement('button');
      delBtn.id = 'selectDelBtn';
      delBtn.className = 'select-del-btn';
      delBtn.textContent = '削除';
      delBtn.disabled = selectedItems.size === 0;
      delBtn.onclick = deleteSelected;
      bar.appendChild(allBtn);
      bar.appendChild(delBtn);
      doneDiv.appendChild(bar);
    }

    const sortedDone = [...doneItems].sort((a, b) => owned[b.en] - owned[a.en]);
    const allTs = Object.values(owned).sort((a, b) => a - b);
    const minTs = allTs[0] || 0;
    const maxTs = allTs[allTs.length - 1] || 1;
    if (displayMode === 'list') {
      const doneList = document.createElement('div');
      doneList.className = 'done-items-list done-items' + (isOpen ? ' open' : '');
      doneList.id = 'done-' + cat;
      for (const item of sortedDone) {
        const row = document.createElement('div');
        row.className = 'list-row list-checked';
        row.dataset.en = item.en;
        row.innerHTML = '<span class="list-check">✓</span><span class="list-name">' + item.ja + '</span><span class="list-src">' + getSrcEmoji(item.s) + '</span>';
        if (!isViewing) row.onclick = () => selectMode ? toggleSelect(item.en) : uncheck(item.en);
        else row.style.cursor = 'default';
        if (selectMode && selectedItems.has(item.en)) row.classList.add('selected');
        doneList.appendChild(row);
      }
      doneDiv.appendChild(doneList);
    } else {
      const doneGrid = document.createElement('div');
      doneGrid.className = 'done-items' + (isOpen ? ' open' : '');
      doneGrid.id = 'done-' + cat;
      for (const item of sortedDone) {
        const ratio = allTs.length <= 1 ? 1 : (owned[item.en] - minTs) / (maxTs - minTs);
        const style = showNew ? getRankStyle(ratio) : null;
        const chip = document.createElement('span');
        chip.className = 'chip chip-done' + (selectedItems.has(item.en) ? ' selected' : '') + (style ? ' chip-new' : '');
        chip.dataset.en = item.en;
        chip.textContent = item.ja;
        if (style) {
          chip.style.borderColor = style.borderColor;
          chip.style.background  = style.background;
          chip.style.color       = style.color;
        }
        if (!isViewing) chip.onclick = () => selectMode ? toggleSelect(item.en) : uncheck(item.en);
        else chip.style.cursor = 'default';
        doneGrid.appendChild(chip);
      }
      doneDiv.appendChild(doneGrid);
    }
    sec.appendChild(doneDiv);
  }
}

function toHira(c) {
  const cp = c.charCodeAt(0);
  return (cp >= 0x30A1 && cp <= 0x30F6) ? String.fromCharCode(cp - 0x60) : c;
}
function jumpToKana(chars, btn) {
  let target = null;
  if (displayMode === 'list') {
    // リストモード: .list-name の先頭文字で検索
    for (const row of document.querySelectorAll('.items-list .list-row:not(.list-checked)')) {
      const nm = row.querySelector('.list-name');
      if (nm && chars.includes(toHira(nm.textContent[0]))) { target = row; break; }
    }
  } else {
    for (const chip of document.querySelectorAll('.chip-todo')) {
      if (chars.includes(toHira(chip.textContent[0]))) { target = chip; break; }
    }
  }
  if (!target) return;

  const offset = document.getElementById('stickyWrapper').offsetHeight;
  const top = target.getBoundingClientRect().top + window.scrollY - offset - 6;
  window.scrollTo({ top, behavior: 'instant' });

  document.querySelectorAll('.kana-btn').forEach(b => b.classList.remove('hit'));
  btn.classList.add('hit');
  setTimeout(() => btn.classList.remove('hit'), 600);
}

// カタカナ→ひらがな変換 + 長音符除去（辞書準拠: か≠が、カ=か）
function normalizeDakuten(s) {
  return [...s.toLowerCase()].map(c => {
    let cp = c.charCodeAt(0);
    // 長音符(ー U+30FC)を除去
    if (cp === 0x30FC) return '';
    // カタカナ→ひらがな (ァ-ン: 30A1-30F6)
    if (cp >= 0x30A1 && cp <= 0x30F6) cp -= 0x60;
    // 濁点・半濁点はそのまま保持（辞書準拠: が≠か）
    return String.fromCharCode(cp);
  }).join('');
}

function matchSearch(ja, en, q) {
  const nq  = normalizeDakuten(q.toLowerCase());
  const nja = normalizeDakuten(ja.toLowerCase());
  const nen = en.toLowerCase();
  // 漢字を除いたかな部分だけのクエリ（「カップ麺」→「カップ」）
  const kanaQ = normalizeDakuten(q.replace(/[\u4E00-\u9FFF\u3400-\u4DBF々〆〇]+/g, '').toLowerCase());
  if (partialMatch) {
    return nja.includes(nq) || nen.includes(q) || (kanaQ && nja.includes(kanaQ));
  } else {
    return nja.startsWith(nq) || nen.startsWith(q) || (kanaQ && nja.startsWith(kanaQ));
  }
}

function toHiraKey(s) {
  return [...s].map(c => { const cp = c.charCodeAt(0); return (cp>=0x30A1&&cp<=0x30F6)?String.fromCharCode(cp-0x60):c; }).join('');
}
// 五十音順（アルファベット始まりは末尾）
function sortByKana(a, b) {
  const aLatin = /^[A-Za-z0-9]/.test(a.ja);
  const bLatin = /^[A-Za-z0-9]/.test(b.ja);
  if (aLatin !== bLatin) return aLatin ? 1 : -1;
  return toHiraKey(a.ja).localeCompare(toHiraKey(b.ja), 'ja');
}
// 入手日順（新着が上）
function sortByNew(a, b, owned) {
  const ta = owned[a.en] || 0;
  const tb = owned[b.en] || 0;
  if (ta && tb) return tb - ta;
  if (ta) return -1;
  if (tb) return 1;
  return sortByKana(a, b);
}

async function loadOtherUsers() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/progress?select=username,mode,owned', { headers: DB_HEADERS });
    if (!res.ok) return;
    const rows = await res.json();
    otherUsersData = {};
    const allNames = [];
    for (const row of rows) {
      if (!allNames.includes(row.username)) allNames.push(row.username);
      if (row.username === currentUser) continue;
      if (!otherUsersData[row.username]) otherUsersData[row.username] = {};
      otherUsersData[row.username][row.mode] = row.owned || {};
    }
    localStorage.setItem('acnh_known_users', JSON.stringify(allNames));
    renderUserSwitcher(allNames);
  } catch(e) { console.error('loadOtherUsers failed', e); }
}
function renderHeaderUsers(names) {
  const el = document.getElementById('headerUsers');
  if (!el) return;
  const others = names.filter(n => n && n !== currentUser).sort();
  if (!others.length) return;
  el.innerHTML = others.map((name, i) => {
    const color = USER_PALETTE[i % USER_PALETTE.length];
    return `<span class="header-user-dot" onclick="openParty('${name}')" style="cursor:pointer;color:rgba(255,255,255,0.95)"><span class="dot" style="background:${color}"></span>${name}</span>`;
  }).join('');
}
function loadHeaderUsers() {
  // キャッシュがあれば先に表示
  try {
    const cached = JSON.parse(localStorage.getItem('acnh_known_users') || '[]');
    if (cached.length) renderHeaderUsers(cached);
  } catch {}
  fetch(SUPABASE_URL + '/rest/v1/progress?select=username', { headers: DB_HEADERS })
    .then(r => r.ok ? r.json() : null)
    .then(rows => {
      if (!rows) return;
      const names = [...new Set(rows.map(r => r.username))];
      localStorage.setItem('acnh_known_users', JSON.stringify(names));
      renderHeaderUsers(names);
    })
    .catch(e => console.error('loadHeaderUsers failed', e));
}

  { key: 'fuku',   label: '服',      color: '#b5447a' },
  { key: 'hhp',    label: 'HHP',     color: '#00796b' },
  { key: 'fossil', label: '化石',    color: '#c8a050' },
];
function checkInMode(en, m) {
  pushUndo();
  const ts = Date.now();
  state[m].owned[en] = ts;
  const prev = mode; mode = m; syncCheck(en, ts); mode = prev;
  save(); render();
}
function toggleModelInAll(ja) {
  if (isViewing) return;
  const kaguEn = MODEL_KAGU_MAP[ja];
  if (kaguEn) {
    if (state.kagu.owned[kaguEn]) delete state.kagu.owned[kaguEn];
    else { state.kagu.owned[kaguEn] = Date.now(); showToast('★ ' + ja + ' 模型完成！', 'success'); }
    localStorage.setItem(KEYS.kagu, JSON.stringify(state.kagu));
    scheduleSyncToCloud();
  } else {
    modelState.done[ja] = !modelState.done[ja];
    if (modelState.done[ja]) showToast('★ ' + ja + ' 模型完成！', 'success');
    saveModel();
  }
  render();
}
function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  isViewing = !!(viewingUser && viewingUser !== currentUser);
  const viewKaguOwned = isViewing ? (otherUsersData[viewingUser]?.kagu || {}) : state.kagu.owned;
  const viewModelDone = isViewing ? (otherUsersData[viewingUser]?.model?.done || {}) : modelState.done;
  const q = search.toLowerCase().trim();
  const seenEn = new Set();
  let totalOwned = 0, totalAll = 0;
  const sortFn = sortOrder === 'new'
    ? (a, b) => { const oa = a._ts || 0, ob = b._ts || 0; return ob - oa || sortByKana(a, b); }
    : sortByKana;
  for (const def of ALL_MODE_DEFS) {
    const m = def.key;
    const isModel = m === 'model';
    const owned = isModel ? null : (isViewing ? (otherUsersData[viewingUser]?.[m] || {}) : state[m].owned);
    const allHits = [];
    for (const catItems of Object.values(DATA[m])) {
      for (const item of catItems) {
        if (!isModel && item.en) {
          if (seenEn.has(item.en)) continue;
          seenEn.add(item.en);
        }
        if (q && !matchSearch(item.ja, item.en || item.ja, q)) continue;
        let isDone, ts;
        if (isModel) {
          const kaguEn = MODEL_KAGU_MAP[item.ja];
          isDone = kaguEn ? !!viewKaguOwned[kaguEn] : !!viewModelDone[item.ja];
          ts = isDone ? 1 : 0;
        } else {
          ts = owned[item.en] || 0;
          isDone = !!ts;
        }
        allHits.push({ ...item, isDone, _ts: ts });
      }
    }
    if (!allHits.length) continue;
    // searchScope フィルター
    const hits = searchScope === 'todo' ? allHits.filter(i => !i.isDone)
               : searchScope === 'done' ? allHits.filter(i =>  i.isDone)
               : allHits;
    if (!hits.length) continue;
    hits.sort(sortFn);
    const modeOwned = allHits.filter(i => i.isDone).length;
    totalOwned += modeOwned;
    totalAll += allHits.length;
    const sec = document.createElement('div');
    sec.className = 'section-block';
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = '<span class="all-mode-label" style="background:' + def.color + '">' + def.label + '</span>'
      + modeOwned + ' / ' + allHits.length + ' 個';
    sec.appendChild(lbl);
    const pct = allHits.length ? Math.round(modeOwned / allHits.length * 100) : 0;
    const bar = document.createElement('div');
    bar.className = 'progress-wrap';
    bar.innerHTML = '<div class="progress-fill" style="width:' + pct + '%"></div>';
    sec.appendChild(bar);
    if (displayMode === 'list') {
      const list = document.createElement('div');
      list.className = 'items-list';
      for (const item of hits) {
        const row = document.createElement('div');
        row.className = 'list-row' + (item.isDone ? ' list-checked' : '');
        row.innerHTML = '<span class="list-check">' + (item.isDone ? '✓' : '') + '</span>'
          + '<span class="list-name">' + item.ja + '</span>'
          + '<span class="list-src">' + getSrcEmoji(item.s) + '</span>';
        if (!isViewing) {
          if (isModel) { const ja = item.ja; row.onclick = () => toggleModelInAll(ja); }
          else { const en = item.en; row.onclick = item.isDone ? () => uncheckFromMode(en, m) : () => checkInMode(en, m); }
        }
        list.appendChild(row);
      }
      sec.appendChild(list);
    } else {
      const grid = document.createElement('div');
      grid.className = 'items-grid';
      for (const item of hits) {
        const chip = document.createElement('span');
        chip.className = 'chip ' + (item.isDone ? 'chip-all-done' : 'chip-todo');
        chip.textContent = item.ja;
        if (!isViewing) {
          if (isModel) { const ja = item.ja; chip.onclick = () => toggleModelInAll(ja); }
          else { const en = item.en; chip.onclick = item.isDone ? () => uncheckFromMode(en, m) : () => checkInMode(en, m); }
        }
        grid.appendChild(chip);
      }
      sec.appendChild(grid);
    }
    main.appendChild(sec);
  }
  const pctAll = totalAll ? Math.round(totalOwned / totalAll * 100) : 0;
  document.getElementById('headerStats').innerHTML =
    '<span style="font-size:10px;opacity:.75">残り' + (totalAll - totalOwned) + '</span>&nbsp;<b style="font-size:17px">' + pctAll + '%</b>';
  if (!main.children.length) {
    const em = document.createElement('div');
    em.className = 'all-mode-hint';
    em.textContent = '見つかりませんでした';
    main.appendChild(em);
  }
}

function renderRecent() {
  renderTabs();
  const main = document.getElementById('main');
  main.innerHTML = '';

  const now = Date.now();
  const MIN_VALID_TS = 1577836800000; // 2020-01-01 以降のタイムスタンプのみ有効
  const viewing = !!(viewingUser && viewingUser !== currentUser);

  const timedItems = [];
  let noTsCount = 0;
  let noTsTotal = 0;

  for (const m of ['kagu', 'recipe', 'music', 'art', 'fuku', 'hhp', 'fossil']) {
    const owned = viewing
      ? (otherUsersData[viewingUser]?.[m] || {})
      : state[m].owned;
    for (const cats of Object.values(DATA[m])) {
      for (const item of cats) {
        const ts = owned[item.en];
        if (!ts) continue;
        noTsTotal++;
        if (typeof ts === 'number' && ts > MIN_VALID_TS) {
          timedItems.push({ ...item, m, ts });
        } else {
          noTsCount++;
        }
      }
    }
  }

  timedItems.sort((a, b) => b.ts - a.ts);
  document.getElementById('headerStats').textContent = noTsTotal + '個収集済み';

  if (!timedItems.length && noTsCount === 0) {
    const refreshWrap2 = document.createElement('div');
    refreshWrap2.className = 'recent-refresh-wrap';
    const refreshBtn2 = document.createElement('button');
    refreshBtn2.id = 'recentRefreshBtn';
    refreshBtn2.className = 'recent-refresh-btn';
    refreshBtn2.innerHTML = '<span class="refresh-icon">↻</span><span class="refresh-label-text">最新を読み込む</span>';
    refreshBtn2.onclick = recentRefresh;
    refreshWrap2.appendChild(refreshBtn2);
    main.appendChild(refreshWrap2);
    const em = document.createElement('div');
    em.style.cssText = 'text-align:center;color:#aaa;padding:40px;font-size:14px;font-weight:700';
    em.textContent = 'まだ何も入手していません';
    main.appendChild(em);
    return;
  }

  function timeLabel(ts) {
    const diff = now - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'たった今';
    if (min < 60) return min + '分前';
    const hr = Math.floor(diff / 3600000);
    if (hr < 24) return hr + '時間前';
    const day = Math.floor(diff / 86400000);
    return day + '日前';
  }

  // 更新ボタン & アップデート内容ボタン
  const refreshWrap = document.createElement('div');
  refreshWrap.className = 'recent-refresh-wrap';
  const refreshBtn = document.createElement('button');
  refreshBtn.id = 'recentRefreshBtn';
  refreshBtn.className = 'recent-refresh-btn';
  refreshBtn.innerHTML = '<span class="refresh-icon">↻</span><span class="refresh-label-text">最新を読み込む</span>';
  refreshBtn.onclick = recentRefresh;
  refreshWrap.appendChild(refreshBtn);
  const changelogBtn = document.createElement('button');
  changelogBtn.className = 'recent-refresh-btn';
  changelogBtn.innerHTML = 'アップデート内容';
  changelogBtn.onclick = openChangelog;
  refreshWrap.appendChild(changelogBtn);
  main.appendChild(refreshWrap);

  const sec = document.createElement('div');
  sec.className = 'recent-section';

  if (timedItems.length === 0 && noTsCount > 0) {
    const note = document.createElement('div');
    note.style.cssText = 'text-align:center;color:#aaa;padding:30px 16px;font-size:13px;font-weight:700';
    note.textContent = noTsCount + '個収集済みですが、取得日時の記録がありません。\n今後ゲットしたアイテムがここに表示されます。';
    main.appendChild(note);
    return;
  }

  // グラデーション用: timedItemsは新しい順なので index 0=最新(ratio=1), last=最古(ratio=0)
  const n = timedItems.length;
  const minTs = n ? timedItems[n - 1].ts : 0;
  const maxTs = n ? timedItems[0].ts : 1;

  for (let idx = 0; idx < timedItems.length; idx++) {
    const item = timedItems[idx];
    const ratio = n <= 1 ? 1 : (item.ts - minTs) / (maxTs - minTs);
    const style = getRankStyle(ratio);

    const row = document.createElement('div');
    row.className = 'recent-item-row' + (!viewing ? ' clickable' : '');
    row.style.background = style.background;
    row.style.borderColor = style.borderColor;

    const name = document.createElement('span');
    name.className = 'recent-item-name';
    name.style.color = style.color;
    name.textContent = item.ja;

    const modeTag = document.createElement('span');
    modeTag.className = 'recent-item-mode';
    modeTag.style.background = RECENT_MODE_COLORS[item.m];
    modeTag.textContent = RECENT_MODE_LABELS[item.m];

    const time = document.createElement('span');
    time.className = 'recent-item-time';
    time.textContent = timeLabel(item.ts);

    row.appendChild(name);
    row.appendChild(modeTag);
    row.appendChild(time);
    if (!viewing) {
      const m = item.m;
      const en = item.en;
      row.onclick = () => {
        if (confirm(item.ja + ' を収集済みから外しますか？')) uncheckFromMode(en, m);
      };
    }
    sec.appendChild(row);
  }

  if (noTsCount > 0) {
    const noTs = document.createElement('div');
    noTs.className = 'recent-date-label';
    noTs.style.marginTop = '18px';
    noTs.textContent = '他 ' + noTsCount + '個収集済み（取得日時不明）';
    sec.appendChild(noTs);
  }

  main.appendChild(sec);
}

function startApp() {
  load();
  buildSyncSets();
  runCrossSync();
  buildSrcFilters();
  buildKanaNav();
  // キャッシュからユーザーバーを先に表示
  try {
    const cached = JSON.parse(localStorage.getItem('acnh_known_users') || '[]');
    if (cached.length) renderUserSwitcher(cached);
  } catch {}
  render();
  initSupabase(() => {
    if (currentUser) {
      const ov = document.getElementById('cloudLoadOverlay');
      if (ov) ov.classList.add('show');
      loadFromCloud(true).then(() => {
        if (ov) ov.classList.remove('show');
        render();
        loadOtherUsers();
      });
    }
  });
  loadOtherUsers();
}
const APP_PASS = 'hirase';
function initUser() {
  if (currentUser && localStorage.getItem('acnh_authed')) {
    startApp();
  } else {
    const overlay = document.getElementById('userModalOverlay');
    overlay.style.display = 'flex';
    const input = document.getElementById('userNameInput');
    const passInput = document.getElementById('userPassInput');
    const passError = document.getElementById('userPassError');
    const btn = document.getElementById('userNameOk');
    (currentUser ? passInput : input).focus();
    if (currentUser) input.value = currentUser;
    function confirm() {
      const name = input.value.trim();
      const pass = passInput.value;
      if (!name) { input.focus(); return; }
      if (pass !== APP_PASS) {
        passError.style.display = 'block';
        passInput.focus();
        passInput.select();
        return;
      }
      passError.style.display = 'none';
      currentUser = name;
      localStorage.setItem('acnh_username', name);
      localStorage.setItem('acnh_authed', '1');
      overlay.style.display = 'none';
      startApp();
    }
    btn.onclick = confirm;
    [input, passInput].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); }));
  }
}
initUser();
</script>
