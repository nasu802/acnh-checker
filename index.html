<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あつ森チェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
  background: #e8f5da;
  color: #222;
  min-height: 100vh;
}

/* モード切替タブ */
.mode-tabs {
  display: flex;
  background: #3d6b2a;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 3px solid #2d5020;
}
.mode-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.15s;
  font-family: inherit;
  letter-spacing: 0.02em;
}
.mode-tab.active {
  color: #fff;
  background: rgba(255,255,255,0.18);
  border-bottom: 3px solid #d4f06a;
  margin-bottom: -3px;
}
.mode-tab:hover:not(.active) { color: rgba(255,255,255,0.88); }

/* ヘッダー */
header {
  color: white;
  padding: 9px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 48px;
  z-index: 100;
  box-shadow: 0 3px 0 rgba(0,0,0,0.15);
}
header h1 { font-size: 16px; font-weight: 800; letter-spacing: 0.03em; flex-shrink: 0; }
.header-stats { font-size: 13px; opacity: 0.95; margin-left: auto; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
#userSwitcher {
  display: flex; gap: 6px; padding: 6px 16px;
  background: #2d5020; border-bottom: 2px solid #1e3c14;
  position: sticky; top: 48px; z-index: 110; overflow-x: auto;
  scrollbar-width: none;
}
#userSwitcher::-webkit-scrollbar { display: none; }
.user-switch-btn {
  padding: 5px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.3);
  background: transparent; color: rgba(255,255,255,0.7);
  font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
}
.user-switch-btn.active {
  background: rgba(255,255,255,0.95); color: #2d5020; border-color: transparent;
}
.viewing-badge {
  font-size: 11px; background: #ff9800; color: white;
  padding: 2px 8px; border-radius: 8px; font-weight: 800; margin-left: 6px;
}
.backup-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 8px; color: white; font-size: 16px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-users {
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.header-user-dot {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9);
}
.header-user-dot .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.5);
}

/* コントロール */
.controls {
  background: white;
  padding: 9px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #ddd;
  position: sticky;
  top: 100px;
  z-index: 99;
}
.search-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}
input[type=search] {
  padding: 6px 32px 6px 14px;
  border: 1.5px solid #ccc;
  border-radius: 20px;
  font-size: 14px;
  font-family: inherit;
  width: 200px;
  outline: none;
  background: white;
  color: #222;
  -webkit-appearance: none;
  appearance: none;
}
input[type=search]::-webkit-search-cancel-button { display: none; }
#searchClear {
  position: absolute;
  right: 6px;
  width: 22px;
  height: 22px;
  background: #bbb;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
  color: white;
  padding: 0;
  line-height: 22px;
  text-align: center;
  display: none;
  font-family: inherit;
}
#searchClear:hover { background: #888; }
.partial-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: #555;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.partial-label input { accent-color: #5a9e38; cursor: pointer; }
#searchScope {
  padding: 5px 8px;
  border: 1.5px solid #ccc;
  border-radius: 10px;
  font-size: 13px;
  font-family: inherit;
  color: #444;
  background: white;
  cursor: pointer;
  outline: none;
}

/* カテゴリタブ */
.cat-tabs {
  background: white;
  padding: 0 12px;
  display: flex;
  gap: 2px;
  overflow-x: auto;
  border-bottom: 2px solid #e0e0e0;
  position: sticky;
  top: 146px;
  z-index: 98;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  border: none;
  background: none;
  color: #888;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.badge {
  font-size: 11px;
  background: #f0f0f0;
  color: #888;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

/* かなナビ */
.kana-nav {
  background: white;
  padding: 6px 12px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  border-bottom: 1px solid #e8e8e8;
  position: sticky;
  top: 192px;
  z-index: 97;
  scrollbar-width: none;
}
.kana-nav::-webkit-scrollbar { display: none; }
.kana-btn {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  border: 1.5px solid #ddd;
  background: white;
  color: #666;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
  flex-shrink: 0;
}
.kana-btn:hover { border-color: #aaa; color: #333; background: #f5f5f5; }

/* メインコンテンツ */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.section-block {
  background: white;
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: 0 3px 0 #bbd498, 0 4px 10px rgba(0,0,0,0.07);
  border: 1.5px solid #d0e8b8;
}

.section-label {
  font-size: 15px;
  font-weight: 800;
  color: #333;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label .cat-icon {
  width: 6px;
  height: 18px;
  border-radius: 3px;
  flex-shrink: 0;
}
.section-remain {
  font-size: 12px;
  color: #999;
  font-weight: 700;
  margin-left: auto;
}

.items-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 15px;
  border-radius: 24px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  border: 2px solid;
  line-height: 1.3;
}
.chip-todo {
  background: white;
  border-color: #ccc;
  color: #333;
  box-shadow: 0 2px 0 #bbb;
}
.chip-todo:active { box-shadow: none; transform: translateY(2px); }

@keyframes chipPop {
  0%   { transform: scale(1);    opacity: 1; }
  30%  { transform: scale(1.18); opacity: 1; }
  70%  { transform: scale(0.9);  opacity: 0.6; }
  100% { transform: scale(0.75); opacity: 0; }
}
.chip-popping {
  pointer-events: none;
  animation: chipPop 0.35s ease forwards;
}

/* 済みセクション */
.done-section {
  border-radius: 12px;
  padding: 12px 14px;
  border: 2px dashed #ddd;
  margin-top: 14px;
  background: #fafafa;
}
.done-header { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.done-title { font-size: 13px; font-weight: 800; color: #aaa; }
.done-count { font-size: 11px; background: #eee; color: #999; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
.done-toggle { margin-left: auto; font-size: 12px; color: #bbb; font-weight: 700; }
.chip-done {
  background: #f2f2f2;
  border-color: #ddd;
  color: #aaa;
  font-size: 13px;
  padding: 5px 12px;
  box-shadow: none;
}
.chip-done::before { content: "✓ "; font-size: 11px; color: #bbb; }
.chip-done:hover { border-color: #ff7043; background: #fff5f3; color: #e05030; }
.chip-done:hover::before { color: #ff7043; }
.chip-done.selected { background: #fff3e0; border-color: #ff9800; color: #e65100; box-shadow: 0 0 0 2px #ffcc80; }
.chip-done.selected::before { content: "☑ "; color: #ff9800; }
.chip-new::after { content: "NEW"; font-size: 9px; background: currentColor; color: white; padding: 1px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; font-weight: 800; opacity: 0.85; }
/* 最近ページ */
.recent-section { padding: 14px 16px; }
.recent-date-label { font-size: 12px; font-weight: 800; color: #999; margin: 12px 0 6px; }
.recent-item-name { font-size: 14px; font-weight: 700; flex: 1; }
.recent-item-mode { font-size: 11px; color: white; padding: 2px 7px; border-radius: 6px; font-weight: 700; flex-shrink: 0; }
.recent-item-time { font-size: 11px; color: #aaa; font-weight: 700; flex-shrink: 0; }
.new-toggle-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1.5px solid #5a9e38; background: #5a9e38; color: white; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
.new-toggle-btn.off { background: white; color: #999; border-color: #ccc; }
.select-bar {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
  padding: 8px 10px; background: #fff8e1; border-radius: 10px;
  border: 1.5px solid #ffe082;
}
.select-bar-count { font-size: 13px; font-weight: 700; color: #f57c00; flex: 1; }
.select-del-btn {
  padding: 5px 14px; border-radius: 8px; border: none;
  background: #ff7043; color: white; font-size: 13px;
  font-weight: 800; font-family: inherit; cursor: pointer;
}
.select-del-btn:disabled { background: #ccc; cursor: default; }
.select-cancel-btn {
  padding: 5px 12px; border-radius: 8px; border: 1.5px solid #ccc;
  background: white; color: #666; font-size: 13px;
  font-weight: 700; font-family: inherit; cursor: pointer;
}
.done-sel-btn {
  font-size: 11px; padding: 2px 8px; border-radius: 6px;
  border: 1.5px solid #ddd; background: white; color: #888;
  font-weight: 700; font-family: inherit; cursor: pointer; margin-left: 6px;
}
.done-sel-btn:hover { border-color: #aaa; color: #444; }

.progress-wrap { background: #eee; border-radius: 6px; height: 7px; overflow: hidden; margin: 10px 0 0; }
.progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }

.done-items { display: none; margin-top: 10px; }
.done-items.open { display: flex; flex-wrap: wrap; gap: 6px; }
.empty { color: #bbb; font-size: 14px; padding: 12px 0; text-align: center; font-weight: 700; }

/* ===== モードごとの色 ===== */

/* 家具: 葉っぱグリーン */
.mode-kagu header { background: #5a9e38; }
.mode-kagu input[type=search]:focus { border-color: #5a9e38; }
.mode-kagu .cat-tab:hover { color: #5a9e38; }
.mode-kagu .cat-tab.active { color: #3d7228; border-bottom-color: #5a9e38; }
.mode-kagu .cat-tab.active .badge { background: #c8eba0; color: #3d7228; }
.mode-kagu .chip-todo:hover { border-color: #5a9e38; background: #edfae0; color: #2d6020; }
.mode-kagu .progress-fill { background: linear-gradient(90deg, #5a9e38, #82c840); }
.mode-kagu .cat-icon { background: #5a9e38; }
.mode-kagu .kana-btn.hit { border-color: #5a9e38; color: #3d7228; background: #edfae0; }

/* レシピ: 空色ブルー */
body.mode-recipe { background: #dceef8; }
.mode-recipe .section-block { box-shadow: 0 3px 0 #9cc4e0, 0 4px 10px rgba(0,0,0,0.07); border-color: #b8d8f0; }
.mode-recipe header { background: #4488cc; }
.mode-recipe input[type=search]:focus { border-color: #4488cc; }
.mode-recipe .cat-tab:hover { color: #4488cc; }
.mode-recipe .cat-tab.active { color: #2d6aaa; border-bottom-color: #4488cc; }
.mode-recipe .cat-tab.active .badge { background: #b8d8f8; color: #2d6aaa; }
.mode-recipe .chip-todo:hover { border-color: #4488cc; background: #e8f4fb; color: #1e5090; }
.mode-recipe .progress-fill { background: linear-gradient(90deg, #4488cc, #68aae8); }
.mode-recipe .cat-icon { background: #4488cc; }
.mode-recipe .kana-btn.hit { border-color: #4488cc; color: #2d6aaa; background: #e8f4fb; }

/* とたけけ: 夕焼けコーラル */
body.mode-music { background: #faeee0; }
.mode-music .section-block { box-shadow: 0 3px 0 #e0b898, 0 4px 10px rgba(0,0,0,0.07); border-color: #f0d0b0; }
.mode-music header { background: #d07040; }
.mode-music input[type=search]:focus { border-color: #d07040; }
.mode-music .cat-tab:hover { color: #d07040; }
.mode-music .cat-tab.active { color: #a05020; border-bottom-color: #d07040; }
.mode-music .cat-tab.active .badge { background: #fad8b8; color: #a05020; }
.mode-music .chip-todo:hover { border-color: #d07040; background: #fef0e8; color: #a05020; }
.mode-music .cat-icon { background: #d07040; }
.mode-music .progress-fill { background: linear-gradient(90deg, #d07040, #f0a060); }
.mode-music .kana-btn.hit { border-color: #d07040; color: #a05020; background: #fef0e8; }

/* 美術品: 博物館ブラウン */
body.mode-art { background: #f2e8d8; }
.mode-art .section-block { box-shadow: 0 3px 0 #c0a070, 0 4px 10px rgba(0,0,0,0.07); border-color: #ddc898; }
.mode-art header { background: #9a6828; }
.mode-art input[type=search]:focus { border-color: #9a6828; }
.mode-art .cat-tab:hover { color: #9a6828; }
.mode-art .cat-tab.active { color: #7a5018; border-bottom-color: #9a6828; }
.mode-art .cat-tab.active .badge { background: #f0d8a0; color: #7a5018; }
.mode-art .chip-todo:hover { border-color: #9a6828; background: #f9f0e0; color: #6a4010; }
.mode-art .progress-fill { background: linear-gradient(90deg, #9a6828, #c89040); }
.mode-art .cat-icon { background: #9a6828; }
.mode-art .kana-btn.hit { border-color: #9a6828; color: #7a5018; background: #f9f0e0; }

/* 服: さくらピンク */
body.mode-fuku { background: #fce4ec; }
.mode-fuku .section-block { box-shadow: 0 3px 0 #f48fb1, 0 4px 10px rgba(0,0,0,0.07); border-color: #f8bbd0; }
.mode-fuku header { background: #e91e8c; }
.mode-fuku input[type=search]:focus { border-color: #e91e8c; }
.mode-fuku .cat-tab:hover { color: #e91e8c; }
.mode-fuku .cat-tab.active { color: #880e4f; border-bottom-color: #e91e8c; }
.mode-fuku .cat-tab.active .badge { background: #fce4ec; color: #880e4f; }
.mode-fuku .chip-todo:hover { border-color: #e91e8c; background: #fce4ec; color: #880e4f; }
.mode-fuku .progress-fill { background: linear-gradient(90deg, #e91e8c, #f06292); }
.mode-fuku .cat-icon { background: #e91e8c; }
.mode-fuku .kana-btn.hit { border-color: #e91e8c; color: #880e4f; background: #fce4ec; }

/* ユーザーモーダル */
.user-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.user-modal-box {
  background: white; border-radius: 20px; padding: 28px 24px;
  max-width: 320px; width: 90%; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.user-modal-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.user-modal-box p { font-size: 13px; color: #666; margin-bottom: 16px; }
.user-modal-box input {
  width: 100%; padding: 10px 14px; font-size: 16px;
  border: 2px solid #ccc; border-radius: 12px; font-family: inherit;
  margin-bottom: 12px; outline: none;
}
.user-modal-box input:focus { border-color: #5a9e38; }
.user-modal-btn {
  width: 100%; padding: 12px; font-size: 16px; font-weight: 800;
  background: #5a9e38; color: white; border: none; border-radius: 12px;
  cursor: pointer; font-family: inherit;
}
.user-modal-btn:hover { background: #4a8e28; }
.user-badge {
  font-size: 12px; background: rgba(255,255,255,0.25);
  padding: 3px 10px; border-radius: 10px; cursor: pointer;
  margin-left: 8px; font-weight: 700; white-space: nowrap;
}
.user-badge:hover { background: rgba(255,255,255,0.4); }
.sync-indicator {
  font-size: 11px; color: rgba(255,255,255,0.7);
  margin-left: 4px;
}
.sync-btn {
  font-size: 15px; padding: 2px 9px; border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.3); background: transparent;
  color: rgba(255,255,255,0.85); cursor: pointer; font-family: inherit;
  margin-left: 4px; line-height: 1.2; transition: opacity 0.2s;
}
.sync-btn:disabled { opacity: 0.35; }
.recent-item-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 10px; background: white; margin-bottom: 4px; border: 1.5px solid #eee; transition: background 0.15s; }
.recent-item-row.clickable { cursor: pointer; }
.recent-item-row.clickable:active { background: #f0f0f0; }
.supabase-setup {
  background: #fff3cd; border: 1.5px solid #ffc107; border-radius: 10px;
  padding: 12px 14px; margin: 8px 16px; font-size: 12px; color: #856404;
  display: none;
}
.supabase-setup a { color: #856404; font-weight: 700; }

/* みんなパネル */
.party-btn {
  font-size: 13px; background: rgba(255,255,255,0.22);
  padding: 4px 10px; border-radius: 10px; cursor: pointer;
  margin-left: 6px; font-weight: 700; white-space: nowrap;
  border: none; color: white; font-family: inherit;
}
.party-btn:hover { background: rgba(255,255,255,0.38); }
.party-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 500;
}
.party-sheet {
  background: white; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 640px; height: 85vh;
  display: flex; flex-direction: column; overflow: hidden;
  padding: 20px 18px 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
}
.party-sheet-title { flex-shrink: 0; }
#partySummaryToggle { flex-shrink: 0; }
#partySummaryView { flex-shrink: 0; overflow-y: auto; max-height: 35vh; }
#partyItemsView { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
#partyControls { flex-shrink: 0; }
#partyItemList { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 32px; }
.party-sheet-title {
  font-size: 16px; font-weight: 800; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.party-close {
  margin-left: auto; background: #eee; border: none; border-radius: 50%;
  width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.party-row {
  border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
  background: #f8f9f8; border: 1.5px solid #e8e8e8;
}
.party-row.is-me { border-color: #5a9e38; background: #f0fae5; }
.party-name {
  font-size: 14px; font-weight: 800; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.party-me-tag {
  font-size: 10px; background: #5a9e38; color: white;
  padding: 2px 7px; border-radius: 8px; font-weight: 700;
}
.party-modes { display: flex; flex-direction: column; gap: 5px; }
.party-mode-row { display: flex; align-items: center; gap: 8px; }
.party-mode-label { font-size: 12px; color: #666; font-weight: 700; width: 80px; flex-shrink: 0; }
.party-bar-wrap { flex: 1; background: #e8e8e8; border-radius: 4px; height: 8px; overflow: hidden; }
.party-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.party-pct { font-size: 11px; color: #888; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }
.party-no-data { text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; font-weight: 700; }
.party-loading { text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; }
/* パーティータブ切替 */
.party-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.party-tab-btn {
  flex: 1; padding: 9px; border-radius: 10px; border: 2px solid #ddd;
  background: white; font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer; color: #666; transition: all 0.12s;
}
.party-tab-btn.active { border-color: #5a9e38; background: #f0fae5; color: #3d7228; }
/* アイテムビュー */
.party-mode-sel { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.party-mode-btn {
  padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; border: 1.5px solid #ddd;
  background: white; color: #666; transition: all 0.12s; white-space: nowrap;
}
.party-mode-btn.active { color: white; border-color: transparent; }
.party-filter { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.party-filter-btn {
  padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; border: 1.5px solid #ddd;
  background: white; color: #666; transition: all 0.12s;
}
.party-filter-btn.active { background: #333; border-color: #333; color: white; }
.party-item-search {
  width: 100%; padding: 7px 12px; border: 1.5px solid #ddd;
  border-radius: 10px; font-size: 13px; font-family: inherit;
  margin-bottom: 6px; outline: none; box-sizing: border-box;
}
.party-item-search:focus { border-color: #5a9e38; }
.party-count-note { font-size: 12px; color: #999; margin-bottom: 6px; font-weight: 700; }
.party-item-list { display: flex; flex-direction: column; gap: 3px; }
.party-item-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: #f8f8f8; border-radius: 10px;
}
.party-item-name { flex: 1; font-size: 13px; font-weight: 700; color: #333; }
.party-dots { display: flex; gap: 3px; flex-shrink: 0; }
.party-dot {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; color: white;
}
.party-dot.not { background: #eee !important; color: #ccc; }
.party-user-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.party-user-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px 5px 6px; border-radius: 20px;
  border: 2px solid transparent; cursor: pointer;
  font-size: 13px; font-weight: 700; font-family: inherit;
  background: #f0f0f0; color: #444; transition: all 0.12s;
}
.party-user-btn .dot {
  width: 18px; height: 18px; border-radius: 50%;
  flex-shrink: 0;
}
.party-user-btn.active { color: white; }
.party-user-btn.active .dot { outline: 2px solid rgba(255,255,255,0.6); }
</style>

function getRankStyle(ratio) {
  // ratio: 0=一番最初にゲット(オレンジ), 1=一番最近ゲット(緑)
  const hue = Math.round(20 + ratio * 110);    // 20(オレンジ) → 130(緑)
  const sat = Math.round(55 + ratio * 20);      // 55% → 75%
  const lBorder = Math.round(52 - ratio * 10); // 52% → 42%
  const lBg = Math.round(97 - ratio * 4);      // 97% → 93%
  const lText = Math.round(42 - ratio * 20);   // 42% → 22%
  return {
    borderColor: `hsl(${hue},${sat}%,${lBorder}%)`,
    background:  `hsl(${hue},${sat}%,${lBg}%)`,
    color:       `hsl(${hue},${sat}%,${lText}%)`,
  };
}

function takeBackup() {
  const total = ['kagu','recipe','music','art','fuku'].reduce((s, m) => s + Object.keys(state[m].owned).length, 0);
  if (total === 0) return;
  const snap = {
    ts: Date.now(),
    user: currentUser,
    data: {}
  };
  for (const m of ['kagu','recipe','music','art','fuku']) snap.data[m] = { ...state[m].owned };
  const list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]');
  list.unshift(snap);
  if (list.length > BACKUP_MAX) list.length = BACKUP_MAX;
  localStorage.setItem(BACKUP_KEY, JSON.stringify(list));
}
function exportBackup() {
  const snap = { ts: Date.now(), user: currentUser, data: {} };
  for (const m of ['kagu','recipe','music','art','fuku']) snap.data[m] = { ...state[m].owned };
  const blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'acnh-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importBackup() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const snap = JSON.parse(ev.target.result);
        if (!snap.data) throw new Error();
        let total = 0;
        for (const m of ['kagu','recipe','music','art','fuku']) {
          if (snap.data[m]) { state[m].owned = { ...state[m].owned, ...snap.data[m] }; total += Object.keys(snap.data[m]).length; }
          localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
        }
        syncToCloud();
        render();
        alert(total + ' 件のデータを復元しました');
      } catch { alert('ファイルの読み込みに失敗しました'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

      updated_at: new Date().toISOString()
    }));
    const res = await fetch(SUPABASE_URL + '/rest/v1/progress', {

async function loadFromCloud() {

function renderPartyItems() {
  if (!partyUserNames.length) return;
  const q = (document.getElementById('partyItemSearch').value || '').toLowerCase();
  const cats = partyItemCat === 'すべて' ? Object.values(DATA[partyItemMode]).flat() : (DATA[partyItemMode][partyItemCat] || []);
  const n = partyUserNames.length;

  const nq = normalizeDakuten(q);
  const filtered = cats.filter(item => {
    if (q && !normalizeDakuten(item.ja).includes(nq) && !item.en.toLowerCase().includes(q)) return false;
    if (partySelectedUser) {
      const has = (partyAllData[partySelectedUser][partyItemMode] || new Set()).has(item.en);
      return partyUserView === 'done' ? has : !has;
    }
    const haveCount = partyUserNames.filter(u => (partyAllData[u][partyItemMode] || new Set()).has(item.en)).length;
    if (partyItemFilter === 'nobody')   return haveCount === 0;
    if (partyItemFilter === 'some')     return haveCount > 0 && haveCount < n;
    if (partyItemFilter === 'everyone') return haveCount === n;
    return true;
  });

  document.getElementById('partyCountNote').textContent = filtered.length + '件';

  const list = document.getElementById('partyItemList');
  list.innerHTML = '';
  for (const item of filtered) {
    const row = document.createElement('div');
    row.className = 'party-item-row';
    const nameEl = document.createElement('span');
    nameEl.className = 'party-item-name';
    nameEl.textContent = item.ja;
    row.appendChild(nameEl);
    const dots = document.createElement('div');
    dots.className = 'party-dots';
    for (const uname of partyUserNames) {
      const has = (partyAllData[uname][partyItemMode] || new Set()).has(item.en);
      const d = document.createElement('div');
      d.className = 'party-dot' + (has ? ' has' : ' not');
      d.style.background = has ? partyUserColors[uname] : '';
      d.title = uname + (has ? ': 持ってる' : ': 未入手');
      d.textContent = uname[0].toUpperCase();
      dots.appendChild(d);
    }
    row.appendChild(dots);
    list.appendChild(row);
  }
}

// undo/redo スタック
let undoStack = [], redoStack = [];
function snapshot() {
  return {
    mode,
    kagu:   { owned: {...state.kagu.owned},   doneOpen: {...state.kagu.doneOpen} },
    recipe: { owned: {...state.recipe.owned}, doneOpen: {...state.recipe.doneOpen} },
    music:  { owned: {...state.music.owned},  doneOpen: {...state.music.doneOpen} },
    art:    { owned: {...state.art.owned},   doneOpen: {...state.art.doneOpen} },
    fuku:   { owned: {...state.fuku.owned},   doneOpen: {...state.fuku.doneOpen} },
  };
}
function pushUndo() {
  undoStack.push(snapshot());
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function applySnapshot(snap) {
  state.kagu   = { owned: {...snap.kagu.owned},   doneOpen: {...snap.kagu.doneOpen} };
  state.recipe = { owned: {...snap.recipe.owned}, doneOpen: {...snap.recipe.doneOpen} };
  state.music  = { owned: {...snap.music.owned},  doneOpen: {...snap.music.doneOpen} };
  state.art    = { owned: {...snap.art.owned},   doneOpen: {...snap.art.doneOpen} };
  state.fuku   = { owned: {...snap.fuku.owned},   doneOpen: {...snap.fuku.doneOpen} };
  for (const m of ['kagu','recipe','music','art','fuku'])
    localStorage.setItem(KEYS[m], JSON.stringify(state[m]));
  render();
}
document.addEventListener('keydown', e => {
  if (!(e.metaKey || e.ctrlKey)) return;
  if (e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (!undoStack.length) return;
    redoStack.push(snapshot());
    applySnapshot(undoStack.pop());
  } else if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) {
    e.preventDefault();
    if (!redoStack.length) return;
    undoStack.push(snapshot());
    applySnapshot(redoStack.pop());
  }
});

function syncCheck(id, ts) {
  if (mode !== 'music') {
    const other = mode === 'kagu' ? 'recipe' : 'kagu';
    if (syncSets[other] && syncSets[other].has(id)) {
      if (ts) state[other].owned[id] = ts;
      else    delete state[other].owned[id];
      localStorage.setItem(KEYS[other], JSON.stringify(state[other]));
    }
  }
}

function check(id, chipEl) {
  pushUndo();
  const ts = Date.now();
  if (chipEl) {
    chipEl.classList.add('chip-popping');
    setTimeout(() => { state[mode].owned[id] = ts; syncCheck(id, ts); save(); render(); }, 320);
  } else {
    state[mode].owned[id] = ts; syncCheck(id, ts); save(); render();
  }
}
function uncheck(id) { pushUndo(); delete state[mode].owned[id]; syncCheck(id, null); save(); render(); }
function uncheckFromMode(id, m) {
  pushUndo();
  const prev = mode; mode = m;
  delete state[m].owned[id];
  syncCheck(id, null);
  mode = prev;
  save(); render();
}

  function toHiraKey(s) {
    return [...s].map(c => { const cp = c.charCodeAt(0); return (cp>=0x30A1&&cp<=0x30F6)?String.fromCharCode(cp-0x60):c; }).join('');
  }

  if (currentCat[mode] === 'すべて') {
    // 全カテゴリを混ぜてあいうえお順に1つのリストで表示
    let allItems = cats.flatMap(cat => items[cat].map(i => ({...i, cat})));
    if (q) allItems = allItems.filter(i => matchSearch(i.ja, i.en, q) || i.cat.includes(q));
    const todoItems = allItems.filter(i => !owned[i.en]).sort((a,b) => toHiraKey(a.ja).localeCompare(toHiraKey(b.ja), 'ja'));
    const doneItems = allItems.filter(i =>  owned[i.en]).sort((a,b) => owned[a.en] - owned[b.en]);

    sec.className = 'section-block';

    const todoItems = itms.filter(i => !owned[i.en]);
    const doneItems = itms.filter(i => owned[i.en]).sort((a, b) => owned[a.en] - owned[b.en]);
    if (!todoItems.length && !doneItems.length) continue;

  }
}

function appendTodoDone(sec, todoItems, doneItems, cat, q, owned) {
  const doneOpen = state[mode].doneOpen;
  const doneLabel = mode === 'kagu' ? '✅ 収集済み' : mode === 'recipe' ? '✅ 習得済み' : mode === 'art' ? '✅ 寄贈済み' : '✅ 入手済み';
  const emptyMsg  = mode === 'kagu' ? '🎉 すべて収集済み！' : mode === 'recipe' ? '🎉 すべて習得済み！' : mode === 'art' ? '🎉 すべて寄贈済み！' : '🎉 すべて入手済み！';

  if (searchScope !== 'done') {
    if (todoItems.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'items-grid';
      for (const item of todoItems) {
        const chip = document.createElement('span');
        chip.className = 'chip chip-todo';
        chip.textContent = item.ja;
        chip.title = item.cat || '';
        if (!isViewing) chip.onclick = () => check(item.en, chip);

        grid.appendChild(chip);
      }
      sec.appendChild(grid);
    } else if (!q) {
      const em = document.createElement('div');
      em.className = 'empty';
      em.textContent = emptyMsg;
      sec.appendChild(em);
    }
  }

  if (doneItems.length > 0) {
    const forceOpen = searchScope === 'done' || (q && searchScope === 'all');
    const isOpen = forceOpen || doneOpen[cat];

    const doneDiv = document.createElement('div');
    doneDiv.className = 'done-section';
    const hdr = document.createElement('div');
    hdr.className = 'done-header';
    const togSpan = document.createElement('span');
    togSpan.id = 'dtog-' + cat;
    togSpan.className = 'done-toggle';
    togSpan.textContent = isOpen ? '▲ 閉じる' : '▼ 済みを見る';
    togSpan.onclick = () => toggleDone(cat);
    hdr.innerHTML = '<span class="done-title">' + doneLabel + '</span>' +
      '<span class="done-count">' + doneItems.length + ' 個</span>';
    // 選択ボタン
    const selBtn = document.createElement('button');
    selBtn.className = 'done-sel-btn';
    selBtn.textContent = selectMode ? 'キャンセル' : '選択';
    selBtn.onclick = e => { e.stopPropagation(); selectMode ? exitSelectMode() : enterSelectMode(); };
    hdr.appendChild(selBtn);
    hdr.appendChild(togSpan);
    doneDiv.appendChild(hdr);

    // 選択モード中のバー
    if (selectMode) {
      const bar = document.createElement('div');
      bar.className = 'select-bar';
      bar.innerHTML = '<span class="select-bar-count" id="selectCount">' + selectedItems.size + '件選択中</span>';
      const allBtn = document.createElement('button');
      allBtn.className = 'select-cancel-btn';
      allBtn.textContent = '全選択';
      allBtn.onclick = () => { doneItems.forEach(i => selectedItems.add(i.en)); document.querySelectorAll('.chip-done[data-en]').forEach(el => el.classList.add('selected')); document.getElementById('selectCount').textContent = selectedItems.size + '件選択中'; document.getElementById('selectDelBtn').disabled = false; };
      const delBtn = document.createElement('button');
      delBtn.id = 'selectDelBtn';
      delBtn.className = 'select-del-btn';
      delBtn.textContent = '削除';
      delBtn.disabled = selectedItems.size === 0;
      delBtn.onclick = deleteSelected;
      bar.appendChild(allBtn);
      bar.appendChild(delBtn);
      doneDiv.appendChild(bar);
    }

    const doneGrid = document.createElement('div');
    doneGrid.className = 'done-items' + (isOpen ? ' open' : '');
    doneGrid.id = 'done-' + cat;
    const sortedDone = [...doneItems].sort((a, b) => owned[b.en] - owned[a.en]);
    // 全モードの収集済みアイテムを時系列でランク付け
    const allTs = Object.values(owned).sort((a, b) => a - b);
    const minTs = allTs[0] || 0;
    const maxTs = allTs[allTs.length - 1] || 1;
    for (const item of sortedDone) {
      const ratio = allTs.length <= 1 ? 1 : (owned[item.en] - minTs) / (maxTs - minTs);
      const style = showNew ? getRankStyle(ratio) : null;
      const chip = document.createElement('span');
      chip.className = 'chip chip-done' + (selectedItems.has(item.en) ? ' selected' : '') + (style ? ' chip-new' : '');
      chip.dataset.en = item.en;
      chip.textContent = item.ja;
      if (style) {
        chip.style.borderColor = style.borderColor;
        chip.style.background  = style.background;
        chip.style.color       = style.color;
      }
      if (!isViewing) chip.onclick = () => selectMode ? toggleSelect(item.en) : uncheck(item.en);
      else chip.style.cursor = 'default';
      doneGrid.appendChild(chip);
    }
    doneDiv.appendChild(doneGrid);
    sec.appendChild(doneDiv);
  }
}

function toHira(c) {
  const cp = c.charCodeAt(0);
  return (cp >= 0x30A1 && cp <= 0x30F6) ? String.fromCharCode(cp - 0x60) : c;
}
function jumpToKana(chars, btn) {

// 濁点・半濁点を除去＋カタカナ→ひらがな変換（か=が=カ=ガ、は=ば=ぱ など）
function normalizeDakuten(s) {
  return [...s.toLowerCase()].map(c => {
    let cp = c.charCodeAt(0);
    // カタカナ→ひらがな (ァ-ン: 30A1-30F6)
    if (cp >= 0x30A1 && cp <= 0x30F6) cp -= 0x60;
    // ひらがな濁音(304C〜3069の偶数)→清音 (が→か, ざ→さ, だ→た, など)
    if (cp >= 0x304C && cp <= 0x3069 && cp % 2 === 0) cp -= 1;
    // は行濁音(ば行: ば,び,ぶ,べ,ぼ)→清音
    if ([0x3070,0x3073,0x3076,0x3079,0x307C].includes(cp)) cp -= 1;
    // ひらがな半濁音(ぱ行: ぱ,ぴ,ぷ,ぺ,ぽ)→清音
    if ([0x3071,0x3074,0x3077,0x307A,0x307D].includes(cp)) cp -= 2;
    return String.fromCharCode(cp);
  }).join('');
}

function matchSearch(ja, en, q) {
  const nq  = normalizeDakuten(q.toLowerCase());
  const nja = normalizeDakuten(ja.toLowerCase());
  const nen = en.toLowerCase();
  // 漢字を除いたかな部分だけのクエリ（「カップ麺」→「カップ」）
  const kanaQ = normalizeDakuten(q.replace(/[\u4E00-\u9FFF\u3400-\u4DBF々〆〇]+/g, '').toLowerCase());
  if (partialMatch) {
    return nja.includes(nq) || nen.includes(q) || (kanaQ && nja.includes(kanaQ));
  } else {
    return nja.startsWith(nq) || nen.startsWith(q) || (kanaQ && nja.startsWith(kanaQ));
  }
}

async function loadOtherUsers() {

    const res = await fetch(SUPABASE_URL + '/rest/v1/progress?select=username,mode,owned', { headers: DB_HEADERS });

    const rows = await res.json();

      if (!allNames.includes(row.username)) allNames.push(row.username);

const RECENT_MODE_LABELS = { kagu: '家具', recipe: 'レシピ', music: 'とたけけ', art: '美術品', fuku: '服' };
const RECENT_MODE_COLORS = { kagu: '#5a9e38', recipe: '#4488cc', music: '#d07040', art: '#9a6828', fuku: '#e91e8c' };
function renderRecent() {
  renderTabs();
  const main = document.getElementById('main');
  main.innerHTML = '';

  const now = Date.now();
  const MIN_VALID_TS = 1577836800000; // 2020-01-01 以降のタイムスタンプのみ有効
  const viewing = !!(viewingUser && viewingUser !== currentUser);

  const timedItems = [];
  let noTsCount = 0;
  let noTsTotal = 0;

  for (const m of ['kagu', 'recipe', 'music', 'art', 'fuku']) {
    const owned = viewing
      ? (otherUsersData[viewingUser]?.[m] || {})
      : state[m].owned;
    for (const cats of Object.values(DATA[m])) {
      for (const item of cats) {
        const ts = owned[item.en];
        if (!ts) continue;
        noTsTotal++;
        if (typeof ts === 'number' && ts > MIN_VALID_TS) {
          timedItems.push({ ...item, m, ts });
        } else {
          noTsCount++;
        }
      }
    }
  }

  timedItems.sort((a, b) => b.ts - a.ts);
  document.getElementById('headerStats').textContent = noTsTotal + '個収集済み';

  if (!timedItems.length && noTsCount === 0) {
    const em = document.createElement('div');
    em.style.cssText = 'text-align:center;color:#aaa;padding:40px;font-size:14px;font-weight:700';
    em.textContent = 'まだ何も入手していません';
    main.appendChild(em);
    return;
  }

  function timeLabel(ts) {
    const diff = now - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'たった今';
    if (min < 60) return min + '分前';
    const hr = Math.floor(diff / 3600000);
    if (hr < 24) return hr + '時間前';
    const day = Math.floor(diff / 86400000);
    return day + '日前';
  }

  const sec = document.createElement('div');
  sec.className = 'recent-section';

  if (timedItems.length === 0 && noTsCount > 0) {
    const note = document.createElement('div');
    note.style.cssText = 'text-align:center;color:#aaa;padding:30px 16px;font-size:13px;font-weight:700';
    note.textContent = noTsCount + '個収集済みですが、取得日時の記録がありません。\n今後ゲットしたアイテムがここに表示されます。';
    main.appendChild(note);
    return;
  }

  // グラデーション用: timedItemsは新しい順なので index 0=最新(ratio=1), last=最古(ratio=0)
  const n = timedItems.length;
  const minTs = n ? timedItems[n - 1].ts : 0;
  const maxTs = n ? timedItems[0].ts : 1;

  for (let idx = 0; idx < timedItems.length; idx++) {
    const item = timedItems[idx];
    const ratio = n <= 1 ? 1 : (item.ts - minTs) / (maxTs - minTs);
    const style = getRankStyle(ratio);

    const row = document.createElement('div');
    row.className = 'recent-item-row' + (!viewing ? ' clickable' : '');
    row.style.background = style.background;
    row.style.borderColor = style.borderColor;

    const name = document.createElement('span');
    name.className = 'recent-item-name';
    name.style.color = style.color;
    name.textContent = item.ja;

    const modeTag = document.createElement('span');
    modeTag.className = 'recent-item-mode';
    modeTag.style.background = RECENT_MODE_COLORS[item.m];
    modeTag.textContent = RECENT_MODE_LABELS[item.m];

    const time = document.createElement('span');
    time.className = 'recent-item-time';
    time.textContent = timeLabel(item.ts);

    row.appendChild(name);
    row.appendChild(modeTag);
    row.appendChild(time);
    if (!viewing) {
      const m = item.m;
      const en = item.en;
      row.onclick = () => {
        if (confirm(item.ja + ' を収集済みから外しますか？')) uncheckFromMode(en, m);
      };
    }
    sec.appendChild(row);
  }

  if (noTsCount > 0) {
    const noTs = document.createElement('div');
    noTs.className = 'recent-date-label';
    noTs.style.marginTop = '18px';
    noTs.textContent = '他 ' + noTsCount + '個収集済み（取得日時不明）';
    sec.appendChild(noTs);
  }

  main.appendChild(sec);
}

function startApp() {
  load();
  buildSyncSets();
  buildKanaNav();
  // キャッシュからユーザーバーを先に表示
  try {
    const cached = JSON.parse(localStorage.getItem('acnh_known_users') || '[]');
    if (cached.length) renderUserSwitcher(cached);
  } catch {}
  render();
  initSupabase(() => {
    if (currentUser) loadFromCloud().then(() => { render(); loadOtherUsers(); });
  });
  loadOtherUsers();
}
const APP_PASS = 'hirase';
function initUser() {
  if (currentUser && localStorage.getItem('acnh_authed')) {
    startApp();
  } else {
    const overlay = document.getElementById('userModalOverlay');
    overlay.style.display = 'flex';
    const input = document.getElementById('userNameInput');
    const passInput = document.getElementById('userPassInput');
    const passError = document.getElementById('userPassError');
    const btn = document.getElementById('userNameOk');
    (currentUser ? passInput : input).focus();
    if (currentUser) input.value = currentUser;
    function confirm() {
      const name = input.value.trim();
      const pass = passInput.value;
      if (!name) { input.focus(); return; }
      if (pass !== APP_PASS) {
        passError.style.display = 'block';
        passInput.focus();
        passInput.select();
        return;
      }
      passError.style.display = 'none';
      currentUser = name;
      localStorage.setItem('acnh_username', name);
      localStorage.setItem('acnh_authed', '1');
      overlay.style.display = 'none';
      startApp();
    }
    btn.onclick = confirm;
    [input, passInput].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); }));
  }
}
initUser();
</script>
